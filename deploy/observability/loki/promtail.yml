server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: ${ARTHEXIS_LOKI_URL:-http://localhost:3100}/loki/api/v1/push

scrape_configs:
  - job_name: arthexis-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: arthexis
          app: arthexis
          __path__: ${ARTHEXIS_LOG_DIR:-/var/log/arthexis}/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            logger: logger
            message: message
            hostname: hostname
            request_id: request_id
            node_id: node_id
            charger_id: charger_id
            session_id: session_id
      - timestamp:
          source: timestamp
          format: RFC3339
      - labels:
          app:
          hostname:
          level:
          logger:
