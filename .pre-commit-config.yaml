repos:
  - repo: local
    hooks:
      - id: mypy-approved-paths
        name: mypy approved paths
        entry: ./scripts/run_mypy.sh
        language: system
        pass_filenames: false
        files: >-
          ^(scripts/(generate_requirements|sort_pyproject_deps)\.py|
          apps/protocols/.*\.py|
          apps/repos/(github\.py|services/github\.py)|
          apps/core/(services/health(_checks)?\.py|modeling/.*\.py|system_ui\.py))$
