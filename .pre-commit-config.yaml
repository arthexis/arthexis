repos:
  - repo: local
    hooks:
      - id: mypy-approved-paths
        name: mypy approved paths
        entry: ./scripts/run_mypy.sh
        language: system
        pass_filenames: false
        # Keep this filter aligned with pyproject.toml [tool.mypy].files, which is the
        # source of truth for the rollout baseline. Migrations stay excluded via
        # pyproject.toml [tool.mypy].exclude and are intentionally omitted here.
        files: '^(scripts/(generate_requirements|sort_pyproject_deps)\.py|apps/protocols/.*\.py|apps/repos/(github\.py|models/repositories\.py|services/github\.py|release_management\.py|task_utils\.py|views/webhooks\.py)|apps/core/(services/(health(_checks)?|odoo_quote_report)\.py|modeling/.*\.py|system_ui\.py))$'
      - id: dead-modules
        name: dead modules
        entry: python3 scripts/check_dead_modules.py
        language: system
        types: [python]
