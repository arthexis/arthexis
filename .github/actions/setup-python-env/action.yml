name: Setup Python CI environment
description: Configure Python and restore pip/virtualenv caches for CI jobs
inputs:
  python-version:
    description: Python version to install
    required: false
    default: '3.13'
runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}
    - name: Cache pip
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: pip-${{ runner.os }}-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
        restore-keys: |
          pip-${{ runner.os }}-
    - name: Cache virtualenv
      uses: actions/cache@v5
      with:
        path: .venv
        key: venv-${{ runner.os }}-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
        restore-keys: |
          venv-${{ runner.os }}-
