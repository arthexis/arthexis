name: Publish Python distributions to GitHub Releases and PyPI

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    name: Run full test suite
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      OCPP_STATE_REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v6
        with:
          clean: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-
      - name: Cache virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            venv-${{ runner.os }}-
      - name: Install suite from repository
        run: |
          ./install.sh --no-start
      - name: Refresh environment dependencies
        run: |
          ./env-refresh.sh
      - name: Validate migrations
        run: |
          ./scripts/preflight-env.sh
          source .venv/bin/activate
          python scripts/check_migration_conflicts.py
          python manage.py migrations check
          python manage.py migrate --noinput --database default
      - name: Install CI dependencies
        run: |
          ./scripts/preflight-env.sh
          source .venv/bin/activate
          python -m pip install --only-binary=:all: -r requirements-ci.txt
      - name: Run tests
        run: |
          set -o pipefail
          ./scripts/preflight-env.sh --pytest
          source .venv/bin/activate
          python -m pytest --maxfail=1 --disable-warnings -q --timeout=180 | tee pytest.log
      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-pytest-log
          path: pytest.log
          if-no-files-found: warn
  build:
    name: Build distributions
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Resolve publish version against PyPI
        id: resolve_publish_version
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import json
          import re
          from urllib.error import HTTPError, URLError
          from urllib.request import urlopen

          root = Path(".")
          semver_re = re.compile(
              r'^(?:(?P<epoch>\d+)!)?(?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)(?:[+].*)?$'
          )
          pypi_url = "https://pypi.org/pypi/arthexis/json"

          version_path = root / "VERSION"
          version_seed = version_path.read_text(encoding="utf-8").strip()
          ref_name = os.environ["GITHUB_REF_NAME"].strip()
          tag_version = ref_name[1:] if ref_name.startswith("v") else ""

          if ref_name.startswith("v") and not tag_version:
              raise SystemExit(
                  "Release publish blocked: tag 'v' does not include a version."
              )

          resolved_seed = tag_version or version_seed

          if not resolved_seed:
              raise SystemExit(
                  "Release publish blocked: neither tag nor VERSION file provide a seed version."
              )


          def parse_version(value: str):
              match = semver_re.match(value.strip())
              if not match:
                  raise SystemExit(
                      f"Release publish blocked: cannot parse semver from value {value!r}."
                  )
              groups = match.groupdict()
              return (
                  int(groups["epoch"] or 0),
                  int(groups["major"]),
                  int(groups["minor"]),
                  int(groups["patch"]),
              )


          def serialize_version(parts):
              epoch, major, minor, patch = parts
              value = f"{major}.{minor}.{patch}"
              return f"{epoch}!{value}" if epoch else value


          def bump_patch(parts):
              epoch, major, minor, patch = parts
              return epoch, major, minor, patch + 1


          try:
              with urlopen(pypi_url, timeout=15) as response:
                  releases = json.load(response).get("releases", {})
          except HTTPError as exc:
              if exc.code == 404:
                  releases = {}
              else:
                  raise SystemExit(
                      "Release publish blocked: unable to verify existing PyPI versions "
                      f"(HTTP {exc.code} from {pypi_url})."
                  ) from exc
          except URLError as exc:
              raise SystemExit(
                  "Release publish blocked: network failure while checking PyPI for an existing release "
                  f"({exc.reason})."
              ) from exc

          base_parts = parse_version(resolved_seed)
          published_parts = []
          for value in releases.keys():
              try:
                  parsed = parse_version(value)
              except SystemExit:
                  continue
              published_parts.append(parsed)

          if tag_version:
              resolved_version = serialize_version(base_parts)
          else:
              resolved_parts = base_parts
              if published_parts:
                  resolved_parts = max([base_parts] + published_parts)
              resolved_version = serialize_version(resolved_parts)
              published = {serialize_version(parts) for parts in published_parts}

              while resolved_version in published:
                  resolved_parts = bump_patch(parse_version(resolved_version))
                  resolved_version = serialize_version(resolved_parts)

          version_path.write_text(f"{resolved_version}\n", encoding="utf-8")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"resolved_version={resolved_version}\n")
              output.write(f"seed_version={resolved_seed}\n")

          print(f"Resolved publish version is {resolved_version!r} from seed {resolved_seed!r}.")
          PY

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Preflight PyPI version availability
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from urllib.error import HTTPError, URLError
          from urllib.request import urlopen

          package_name = "arthexis"
          package_version = Path("VERSION").read_text(encoding="utf-8").strip()
          pypi_url = f"https://pypi.org/pypi/{package_name}/json"

          try:
              with urlopen(pypi_url, timeout=15) as response:
                  payload = json.load(response)
          except HTTPError as exc:
              if exc.code == 404:
                  payload = {"releases": {}}
              else:
                  raise SystemExit(
                      "Release publish blocked: unable to verify existing PyPI versions "
                      f"(HTTP {exc.code} from {pypi_url}). "
                      "Check Arthexis release UI/headless logs, then rerun intentionally."
                  ) from exc
          except URLError as exc:
              raise SystemExit(
                  "Release publish blocked: network failure while checking PyPI for an existing release "
                  f"({exc.reason}). Check Arthexis release UI/headless logs, then rerun intentionally."
              ) from exc

          releases = payload.get("releases", {})
          if package_version in releases:
              raise SystemExit(
                  f"Release publish blocked: {package_name} {package_version} is already available on PyPI. "
                  "Use a new VERSION/tag before publishing again, and confirm the rerun intent in "
                  "Arthexis release UI/headless logs for traceability."
              )

          print(
              f"Preflight passed: {package_name} {package_version} is not yet published on PyPI; "
              "continuing with build and publish workflow."
          )
          PY

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine

      - name: Build sdist and wheel
        run: |
          mkdir -p validation-logs
          set -o pipefail
          python -m build 2>&1 | tee validation-logs/build.log

      - name: Validate package metadata
        run: |
          mkdir -p validation-logs
          set -o pipefail
          python -m twine check dist/* 2>&1 | tee validation-logs/twine-check.log

      - name: Smoke install from built artifacts
        run: |
          mkdir -p validation-logs
          python -m venv .smoke-venv
          source .smoke-venv/bin/activate
          set -o pipefail
          python -m pip install --upgrade pip 2>&1 | tee validation-logs/smoke-pip-upgrade.log
          python -m pip install --no-index --find-links dist --no-deps arthexis 2>&1 | tee validation-logs/smoke-install.log
          python - <<'PY' 2>&1 | tee validation-logs/smoke-import.log
          import importlib.metadata
          import arthexis

          package_version = importlib.metadata.version("arthexis")
          module_version = getattr(arthexis, "__version__", None)
          print(f"Installed package version: {package_version}")
          print(f"arthexis.__version__: {module_version}")
          if module_version is None:
              raise SystemExit("arthexis.__version__ is missing")
          if module_version != package_version:
              raise SystemExit(
                  f"Version mismatch between module ({module_version}) and metadata ({package_version})"
              )
          PY

      - name: Upload validation logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: arthexis-validation-logs
          path: validation-logs/
          if-no-files-found: warn

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: arthexis-dists
          path: dist/

  publish-to-github-release:
    name: Upload distributions to GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_REPO: ${{ github.repository }}
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: arthexis-dists
          path: dist/

      - name: Upload distributions to GitHub Release
        run: |
          shopt -s nullglob
          artifacts=(dist/*.whl dist/*.tar.gz)
          if [ ${#artifacts[@]} -eq 0 ]; then
            echo "No release distributions found in dist/." >&2
            exit 1
          fi

          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" "${artifacts[@]}" --clobber --repo "${GITHUB_REPOSITORY}"
          else
            gh release create "${GITHUB_REF_NAME}" "${artifacts[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --verify-tag \
              --title "${GITHUB_REF_NAME}" \
              --generate-notes
          fi

          printf 'Published GitHub Release assets for %s:\n' "${GITHUB_REF_NAME}"
          printf ' - %s\n' "${artifacts[@]}"

  publish-to-pypi:
    name: Publish to PyPI via Trusted Publisher
    needs:
      - build
      - publish-to-github-release
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/arthexis/
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: arthexis-dists
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
