name: Publish Python distribution to PyPI

on:
  push:
    tags:
      - "v*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    name: Run full test suite
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      OCPP_STATE_REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v6
        with:
          clean: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-
      - name: Cache virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            venv-${{ runner.os }}-
      - name: Install suite from repository
        run: |
          ./install.sh --no-start
      - name: Validate migrations
        run: |
          source .venv/bin/activate
          python scripts/check_migration_conflicts.py
          python manage.py migrations check
          python manage.py migrate --noinput --database default
      - name: Install CI dependencies
        run: |
          source .venv/bin/activate
          python -m pip install --only-binary=:all: -r requirements-ci.txt
      - name: Run tests
        run: |
          set -o pipefail
          source .venv/bin/activate
          pytest --maxfail=1 --disable-warnings -q --timeout=180 | tee pytest.log
      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-pytest-log
          path: pytest.log
          if-no-files-found: warn
  build:
    name: Build distributions
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Validate release tag matches package version
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import tomllib

          root = Path(".")
          ref_name = os.environ["GITHUB_REF_NAME"].strip()
          tag_version = ref_name[1:] if ref_name.startswith("v") else ref_name

          version_path = root / "VERSION"
          expected_version = version_path.read_text(encoding="utf-8").strip()

          pyproject = tomllib.loads((root / "pyproject.toml").read_text(encoding="utf-8"))
          dynamic_version_files = (
              pyproject.get("tool", {})
              .get("setuptools", {})
              .get("dynamic", {})
              .get("version", {})
              .get("file", [])
          )
          if isinstance(dynamic_version_files, str):
              dynamic_version_files = [dynamic_version_files]

          if dynamic_version_files:
              dynamic_path = root / dynamic_version_files[0]
              dynamic_version = dynamic_path.read_text(encoding="utf-8").strip()
              if dynamic_version != expected_version:
                  raise SystemExit(
                      "Release publish blocked: VERSION and setuptools dynamic version file differ. "
                      f"VERSION={expected_version!r}; {dynamic_path}={dynamic_version!r}."
                  )

          if tag_version != expected_version:
              raise SystemExit(
                  "Release publish blocked: tag and package version differ. "
                  f"Tag {ref_name!r} resolves to {tag_version!r}, but VERSION is {expected_version!r}. "
                  "Update VERSION (and dynamic version source) or retag before publishing."
              )

          print(f"Version gate passed: tag {ref_name!r} matches package version {expected_version!r}.")
          PY

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Preflight PyPI version availability
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from urllib.error import HTTPError, URLError
          from urllib.request import urlopen

          package_name = "arthexis"
          package_version = Path("VERSION").read_text(encoding="utf-8").strip()
          pypi_url = f"https://pypi.org/pypi/{package_name}/json"

          try:
              with urlopen(pypi_url, timeout=15) as response:
                  payload = json.load(response)
          except HTTPError as exc:
              if exc.code == 404:
                  payload = {"releases": {}}
              else:
                  raise SystemExit(
                      "Release publish blocked: unable to verify existing PyPI versions "
                      f"(HTTP {exc.code} from {pypi_url}). "
                      "Check Arthexis release UI/headless logs, then rerun intentionally."
                  ) from exc
          except URLError as exc:
              raise SystemExit(
                  "Release publish blocked: network failure while checking PyPI for an existing release "
                  f"({exc.reason}). Check Arthexis release UI/headless logs, then rerun intentionally."
              ) from exc

          releases = payload.get("releases", {})
          if package_version in releases:
              raise SystemExit(
                  f"Release publish blocked: {package_name} {package_version} is already available on PyPI. "
                  "Use a new VERSION/tag before publishing again, and confirm the rerun intent in "
                  "Arthexis release UI/headless logs for traceability."
              )

          print(
              f"Preflight passed: {package_name} {package_version} is not yet published on PyPI; "
              "continuing with build and publish workflow."
          )
          PY

      - name: Install build backend
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: arthexis-dists
          path: dist/

  publish-to-pypi:
    name: Publish to PyPI via Trusted Publisher
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/arthexis/
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
    permissions:
      id-token: write
      attestations: write
      contents: read
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: arthexis-dists
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true
