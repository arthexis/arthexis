name: Upgrade Gate

permissions:
  contents: read
  issues: write

env:
  PYTHONDONTWRITEBYTECODE: '1'
  NODE_OPTIONS: '--no-deprecation'
  ARTHEXIS_DB_BACKEND: sqlite
  PYTEST_WORKERS: 'auto'
  UPGRADE_GATE_MARKER: gate_upgrade

concurrency:
  group: upgrade-gate-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - converted_to_draft
    paths:
      - "**/*.py"
      - "**/*.json"
      - "**/*.toml"
      - "**/*.txt"
      - ".github/workflows/ci.yml"
      - "apps/**"
      - "config/**"
      - "scripts/**"
      - "tests/**"
      - "manage.py"
      - "configure.sh"
      - "env-refresh.bat"
      - "env-refresh.sh"
      - "install.bat"
      - "install.sh"
      - "service.bat"
      - "start.bat"
      - "start.sh"
      - "stop.bat"
      - "stop.sh"
      - "upgrade.bat"
      - "upgrade.sh"
  push:
    branches:
      - main
      - 'release/**'
    paths:
      - '**/*.py'
      - '**/*.json'
      - '**/*.toml'
      - '**/*.txt'
      - '.github/workflows/ci.yml'
      - 'apps/**'
      - 'config/**'
      - 'scripts/**'
      - 'tests/**'
      - 'manage.py'
      - 'configure.sh'
      - 'env-refresh.bat'
      - 'env-refresh.sh'
      - 'install.bat'
      - 'install.sh'
      - 'service.bat'
      - 'start.bat'
      - 'start.sh'
      - 'stop.bat'
      - 'stop.sh'
      - 'upgrade.bat'
      - 'upgrade.sh'
  workflow_dispatch:

jobs:
  cold_install_smoke:
    name: Cold Linux install smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      OCPP_STATE_REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v6
        with:
          clean: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install base system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates curl git python3-venv \
            libcairo2 libgdk-pixbuf-2.0-0 libpango-1.0-0 \
            libpangocairo-1.0-0 shared-mime-info

      - name: Run cold install smoke
        run: |
          ./scripts/ci/install-linux-smoke.sh --cold

  windows_install_smoke:
    name: Windows install.bat smoke
    runs-on: windows-latest
    timeout-minutes: 40
    permissions:
      contents: read
    env:
      ARTHEXIS_DB_BACKEND: sqlite
      PYTHONDONTWRITEBYTECODE: '1'
      NODE_OPTIONS: '--no-deprecation'
    steps:
      - uses: actions/checkout@v6
        with:
          clean: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Install GTK runtime for WeasyPrint
        id: setup_msys2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-cairo
            mingw-w64-x86_64-gdk-pixbuf2
            mingw-w64-x86_64-libffi
            mingw-w64-x86_64-pango

      - name: Add GTK runtime to PATH
        shell: pwsh
        run: |
          $gtkBin = Join-Path '${{ steps.setup_msys2.outputs.msys2-location }}' 'mingw64\bin'
          if (-not (Test-Path $gtkBin)) {
            throw "Expected MSYS2 GTK bin directory at $gtkBin"
          }
          $gtkBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          "WEASYPRINT_DLL_DIRECTORIES=$gtkBin" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Run Windows install smoke
        shell: pwsh
        run: |
          .\scripts\ci\install-windows-smoke.ps1

  upgrade:
    name: Upgrade safety gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      OCPP_STATE_REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v6
        with:
          clean: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Cache virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('requirements*.txt', 'pyproject.toml', 'install.sh', 'env-refresh.sh', 'upgrade.sh') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Validate pyproject dependency ordering
        id: validate_pyproject_ordering
        run: |
          python "$GITHUB_WORKSPACE/scripts/sort_pyproject_deps.py" --check

      - name: Validate generated requirements
        id: validate_generated_requirements
        run: |
          python "$GITHUB_WORKSPACE/scripts/generate_requirements.py" --check

      # install.sh already performs env-refresh.sh --install-and-refresh.
      # Keep CI on that single bootstrap path so the gate does not add a
      # standalone refresh pass with slightly different environment behavior.
      - name: Install suite from repository
        id: install_suite
        run: |
          ./install.sh --no-start

      - name: Install CI dependencies
        id: install_ci_dependencies
        run: |
          ./scripts/preflight-env.sh
          source .venv/bin/activate
          python -m pip install --only-binary=:all: -r requirements-ci.txt
      - name: Verify editable install import
        id: verify_editable_install
        run: |
          source .venv/bin/activate
          python scripts/check_editable_install_import.py

      - name: Apply upgrade smoke path
        id: apply_upgrade_smoke
        run: |
          set -Eeuo pipefail
          source .venv/bin/activate
          ./upgrade.sh --local --no-restart

      - name: Validate upgraded migrations
        id: validate_upgraded_migrations
        run: |
          set -Eeuo pipefail
          ./scripts/preflight-env.sh
          source .venv/bin/activate
          python scripts/check_migration_conflicts.py
          python manage.py migrations check
          python manage.py migrate --noinput --database default

      - name: Detect pytest xdist arguments
        id: detect_pytest_xdist
        run: |
          set -Eeuo pipefail
          source .venv/bin/activate
          pytest_help="$(python -m pytest --help)"
          if grep -q -- '--dist' <<<"$pytest_help"; then
            workers="${PYTEST_WORKERS:-auto}"
            echo "PYTEST_XDIST_ARGS=-n ${workers} --dist loadfile" >> "${GITHUB_ENV}"
          else
            echo "PYTEST_XDIST_ARGS=" >> "${GITHUB_ENV}"
          fi

      - name: Run auto-upgrade checks
        id: run_auto_upgrade_checks
        run: |
          set -Eeuo pipefail
          ./scripts/preflight-env.sh --pytest
          source .venv/bin/activate
          read -r -a xdist_args <<< "${PYTEST_XDIST_ARGS:-}"
          python -m pytest "${xdist_args[@]}" -m "${UPGRADE_GATE_MARKER}" --maxfail=1 --disable-warnings -q --timeout=180 | tee pytest.log

      - name: Summarize failure context
        if: failure()
        run: |
          set -Eeuo pipefail
          python - <<'PY' > ci-failure-summary.md
          import os
          from pathlib import Path

          step_status = [
              ("Validate pyproject dependency ordering", "${{ steps.validate_pyproject_ordering.conclusion }}"),
              ("Validate generated requirements", "${{ steps.validate_generated_requirements.conclusion }}"),
              ("Install suite from repository", "${{ steps.install_suite.conclusion }}"),
              ("Install CI dependencies", "${{ steps.install_ci_dependencies.conclusion }}"),
              ("Verify editable install import", "${{ steps.verify_editable_install.conclusion }}"),
              ("Apply upgrade smoke path", "${{ steps.apply_upgrade_smoke.conclusion }}"),
              ("Validate upgraded migrations", "${{ steps.validate_upgraded_migrations.conclusion }}"),
              ("Detect pytest xdist arguments", "${{ steps.detect_pytest_xdist.conclusion }}"),
              ("Run auto-upgrade checks", "${{ steps.run_auto_upgrade_checks.conclusion }}"),
          ]

          failed_step_name = "Unknown"
          for name, conclusion in step_status:
              if conclusion == "failure":
                  failed_step_name = name
                  break

          summary_lines = [
              "## Upgrade Gate failure details",
              "",
              f"- Workflow run: https://github.com/{os.environ['GITHUB_REPOSITORY']}/actions/runs/{os.environ['GITHUB_RUN_ID']}",
              f"- Commit: `{os.environ['GITHUB_SHA']}`",
              f"- Failed step: **{failed_step_name}**",
          ]

          if failed_step_name == "Run auto-upgrade checks":
              pytest_log = Path("pytest.log")
              if pytest_log.exists():
                  lines = pytest_log.read_text(encoding="utf-8", errors="replace").splitlines()
                  failure_candidates = [line.strip() for line in lines if "FAILED " in line]
                  if failure_candidates:
                      summary_lines.append("")
                      summary_lines.append("### Failed test(s)")
                      summary_lines.extend(f"- `{line}`" for line in failure_candidates[:5])

                  tail = "\n".join(lines[-40:])
                  if tail.strip():
                      summary_lines.append("")
                      summary_lines.append("### Pytest log tail")
                      summary_lines.append("```text")
                      summary_lines.append(tail)
                      summary_lines.append("```")
              else:
                  summary_lines.append("")
                  summary_lines.append("- `pytest.log` was not found in the runner workspace.")

          summary = "\n".join(summary_lines).strip() + "\n"
          max_summary_chars = 65000
          if len(summary) > max_summary_chars:
              summary = summary[:max_summary_chars].rstrip() + "\n... (truncated)\n"
          print(summary)
          PY

      - name: Comment on pull request with failure details
        if: failure() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v9
        with:
          script: |
            const fs = require('fs');
            const path = 'ci-failure-summary.md';
            if (!fs.existsSync(path)) {
              core.warning('No ci-failure-summary.md found; skipping PR comment.');
              return;
            }

            const summary = fs.readFileSync(path, 'utf8').trim();
            const marker = '<!-- upgrade-gate-failure-comment -->';
            const body = `${marker}\n${summary}`;
            const issue_number = context.issue.number;
            const { owner, repo } = context.repo;

            try {
              const comments = await github.paginate(github.rest.issues.listComments, {
                owner,
                repo,
                issue_number,
                per_page: 100,
              });

              const existing = comments.find((comment) =>
                comment.user?.type === 'Bot' && comment.body?.includes(marker),
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner,
                  repo,
                  comment_id: existing.id,
                  body,
                });
              } else {
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body,
                });
              }
            } catch (error) {
              if (error?.status === 403) {
                core.warning(`Skipping PR failure comment due to token permissions: ${error.message}`);
                return;
              }
              throw error;
            }

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: upgrade-gate-pytest-log
          path: pytest.log
          if-no-files-found: warn

      - name: Upload failure summary
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: upgrade-gate-failure-summary
          path: ci-failure-summary.md
          if-no-files-found: warn
