name: CI

permissions:
  contents: read
  pull-requests: write

env:
  PYTHONDONTWRITEBYTECODE: '1'
  NODE_OPTIONS: '--no-deprecation'
  ARTHEXIS_DB_BACKEND: sqlite

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  upgrade:
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    uses: ./.github/workflows/ci-upgrade.yml
    secrets: inherit

  install:
    if: ${{ (github.event_name != 'pull_request' || !github.event.pull_request.draft) && needs.upgrade.result == 'failure' }}
    needs: upgrade
    uses: ./.github/workflows/ci-install.yml
    secrets: inherit

  notify-failure:
    if: ${{ failure() && github.event_name == 'pull_request' && !github.event.pull_request.draft }}
    needs:
      - install
      - upgrade
    permissions:
      actions: read
      contents: read
      pull-requests: write
    uses: ./.github/workflows/ci-notify.yml
    with:
      install-result: ${{ needs.install.result }}
      upgrade-result: ${{ needs.upgrade.result }}
    secrets: inherit
