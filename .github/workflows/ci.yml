name: Upgrade Gate

permissions:
  contents: read

env:
  PYTHONDONTWRITEBYTECODE: '1'
  NODE_OPTIONS: '--no-deprecation'
  ARTHEXIS_DB_BACKEND: sqlite
  PYTEST_WORKERS: 'auto'

concurrency:
  group: upgrade-gate-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
      - 'release/**'
    paths:
      - '**/*.py'
      - '**/*.json'
      - '**/*.toml'
      - '**/*.txt'
      - '.github/workflows/ci.yml'
      - 'apps/**'
      - 'config/**'
      - 'scripts/**'
      - 'tests/**'
      - 'manage.py'
      - 'configure.sh'
      - 'env-refresh.sh'
      - 'install.sh'
      - 'start.sh'
      - 'stop.sh'
      - 'upgrade.sh'
  workflow_dispatch:

jobs:
  upgrade:
    name: Upgrade safety gate
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      OCPP_STATE_REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v6
        with:
          clean: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Cache virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('requirements*.txt', 'pyproject.toml', 'install.sh', 'upgrade.sh') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Validate pyproject dependency ordering
        run: |
          python "$GITHUB_WORKSPACE/scripts/sort_pyproject_deps.py" --check

      - name: Validate generated requirements
        run: |
          python "$GITHUB_WORKSPACE/scripts/generate_requirements.py" --check

      - name: Install suite from repository
        run: |
          ./install.sh --no-start

      - name: Refresh environment dependencies
        run: |
          ./env-refresh.sh

      - name: Install CI dependencies
        run: |
          ./scripts/preflight-env.sh
          source .venv/bin/activate
          python -m pip install --only-binary=:all: -r requirements-ci.txt
      - name: Verify editable install import
        run: |
          source .venv/bin/activate
          python scripts/check_editable_install_import.py

      - name: Apply upgrade smoke path
        run: |
          set -Eeuo pipefail
          source .venv/bin/activate
          ./upgrade.sh --local --no-restart

      - name: Validate upgraded migrations
        run: |
          set -Eeuo pipefail
          ./scripts/preflight-env.sh
          source .venv/bin/activate
          python scripts/check_migration_conflicts.py
          python manage.py migrations check
          python manage.py migrate --noinput --database default

      - name: Detect pytest xdist arguments
        run: |
          set -Eeuo pipefail
          source .venv/bin/activate
          pytest_help="$(python -m pytest --help)"
          if grep -q -- '--dist' <<<"$pytest_help"; then
            workers="${PYTEST_WORKERS:-auto}"
            echo "PYTEST_XDIST_ARGS=-n ${workers} --dist loadfile" >> "${GITHUB_ENV}"
          else
            echo "PYTEST_XDIST_ARGS=" >> "${GITHUB_ENV}"
          fi

      - name: Run critical auto-upgrade checks
        run: |
          set -Eeuo pipefail
          ./scripts/preflight-env.sh --pytest
          source .venv/bin/activate
          read -r -a xdist_args <<< "${PYTEST_XDIST_ARGS:-}"
          python -m pytest "${xdist_args[@]}" --maxfail=1 --disable-warnings -q --timeout=180 -m "critical and not integration" | tee pytest.log

      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: upgrade-gate-pytest-log
          path: pytest.log
          if-no-files-found: warn
