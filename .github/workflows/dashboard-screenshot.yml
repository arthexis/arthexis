name: Screenshot

env:
  PYTHONDONTWRITEBYTECODE: '1'
  NODE_OPTIONS: '--no-deprecation'

concurrency:
  group: dashboard-screenshot-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '17 6 * * *'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  detect-preview-changes:
    name: Detect preview-relevant changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      preview: ${{ steps.decide.outputs.preview }}
    steps:
      - uses: actions/checkout@v6
        with:
          clean: false

      - name: Default to preview capture for non-PR events
        id: default-preview
        if: ${{ github.event_name != 'pull_request' }}
        run: echo "preview=true" >> "$GITHUB_OUTPUT"

      - name: Detect UI/admin/template changes
        id: filter
        if: ${{ github.event_name == 'pull_request' }}
        uses: dorny/paths-filter@v4
        with:
          filters: |
            preview:
              - '.github/workflows/dashboard-screenshot.yml'
              - '.github/screenshot-paths.authenticated.txt'
              - '.github/screenshot-paths.public.txt'
              - 'apps/playwright/management/commands/preview.py'
              - 'apps/**/context_processors.py'
              - 'apps/**/context_processors/**/*.py'
              - 'config/settings/**/*.py'
              - 'templates/**'
              - 'static/**'
              - 'apps/**/templates/**'
              - 'apps/**/static/**'
              - 'apps/**/admin.py'
              - 'apps/**/admin/**/*.py'
              - 'apps/**/views.py'
              - 'apps/**/views/**/*.py'
              - 'apps/**/forms.py'
              - 'apps/**/forms/**/*.py'
              - 'apps/**/urls.py'

      - name: Choose preview capture flag
        id: decide
        run: |
          preview_flag="${{ steps.default-preview.outputs.preview || steps.filter.outputs.preview || 'false' }}"
          echo "preview=${preview_flag}" >> "$GITHUB_OUTPUT"

  capture-dashboard:
    name: Capture admin dashboard
    needs:
      - detect-preview-changes
    if: ${{ github.event_name != 'pull_request' || needs.detect-preview-changes.outputs.preview == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Ensure workspace is writable
        run: sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v6
        with:
          clean: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-preview-${{ hashFiles('requirements*.txt', 'pyproject.toml', 'env-refresh.sh') }}
          restore-keys: |
            pip-${{ runner.os }}-preview-

      - name: Cache virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-preview-${{ hashFiles('requirements*.txt', 'pyproject.toml', 'install.sh', 'env-refresh.sh') }}
          restore-keys: |
            venv-${{ runner.os }}-preview-

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pyproject.toml', 'requirements-ci.txt', 'env-refresh.sh') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install suite from repository
        run: |
          ./install.sh --clean --no-start

      - name: Install preview/browser dependencies
        run: |
          ./env-refresh.sh --deps-only --preview-deps

      - name: Prepare database and admin account
        run: |
          source .venv/bin/activate
          python manage.py migrate --noinput --database default
          python manage.py health --target core.admin --force
          python manage.py collectstatic --noinput

      - name: Seed OCPP demo data
        run: |
          source .venv/bin/activate
          python manage.py shell <<'PY'
          from decimal import Decimal
          from django.utils import timezone

          from apps.ocpp.models import Charger, MeterValue, Transaction

          now = timezone.now()
          charger, _ = Charger.objects.get_or_create(
              charger_id="SIM-CP-1",
              defaults={
                  "display_name": "Simulated Charger",
                  "connector_id": 1,
                  "public_display": True,
                  "last_status": "Charging",
                  "last_heartbeat": now,
              },
          )

          active_tx, _ = Transaction.objects.get_or_create(
              charger=charger,
              connector_id=1,
              stop_time=None,
              defaults={
                  "start_time": now - timezone.timedelta(minutes=15),
                  "received_start_time": now - timezone.timedelta(minutes=15),
                  "meter_start": 1000,
                  "ocpp_transaction_id": "SIM-ACTIVE",
              },
          )

          completed_tx, _ = Transaction.objects.get_or_create(
              charger=charger,
              connector_id=1,
              ocpp_transaction_id="SIM-COMPLETED",
              defaults={
                  "start_time": now - timezone.timedelta(hours=2),
                  "stop_time": now - timezone.timedelta(hours=1, minutes=30),
                  "received_start_time": now - timezone.timedelta(hours=2),
                  "received_stop_time": now - timezone.timedelta(hours=1, minutes=30),
                  "meter_start": 800,
                  "meter_stop": 1200,
              },
          )

          MeterValue.objects.get_or_create(
              charger=charger,
              transaction=completed_tx,
              connector_id=1,
              timestamp=completed_tx.stop_time or now,
              defaults={
                  "context": "Sample.Periodic",
                  "energy": Decimal("4.200"),
              },
          )

          MeterValue.objects.get_or_create(
              charger=charger,
              transaction=active_tx,
              connector_id=1,
              timestamp=now,
              defaults={
                  "context": "Sample.Periodic",
                  "energy": Decimal("1.800"),
              },
          )
          PY

      - name: Launch application server
        env:
          PORT: 8888
        run: |
          source .venv/bin/activate
          DJANGO_SUPPRESS_MIGRATION_CHECK=1 python manage.py runserver 0.0.0.0:"${PORT}" --noreload > /tmp/django-server.log 2>&1 &
          echo $! > /tmp/django-server.pid

          echo "Waiting for server to become healthy..."
          healthy=false
          for attempt in {1..30}; do
            if curl -fsS "http://localhost:${PORT}/admin/login/?next=/admin/" >/dev/null; then
              healthy=true
              break
            fi
            sleep 2
          done

          if [ "$healthy" = false ]; then
            echo "Server failed to start in time. Recent logs:"
            tail -n 50 /tmp/django-server.log || true
            exit 1
          fi

      - name: Capture authenticated previews
        run: |
          source .venv/bin/activate
          python <<'PY' > /tmp/authenticated-screenshot-paths.txt
          from pathlib import Path

          defaults = ["/admin/", "/ocpp/cpms/dashboard/"]
          configured_paths_file = Path(".github/screenshot-paths.authenticated.txt")
          configured = []

          if configured_paths_file.exists():
              for raw_line in configured_paths_file.read_text(encoding="utf-8").splitlines():
                  line = raw_line.strip()
                  if not line or line.startswith("#"):
                      continue
                  configured.append(line if line.startswith("/") else f"/{line}")

          ordered = []
          for path in defaults + configured:
              if path not in ordered:
                  ordered.append(path)

          print("\n".join(ordered))
          PY

          capture_paths=()
          while IFS= read -r path; do
            capture_paths+=("--path" "$path")
          done < /tmp/authenticated-screenshot-paths.txt

          python manage.py preview \
            --base-url http://127.0.0.1:8888 \
            --wait-for-suite \
            --suite-timeout 60 \
            --ci-fast \
            --ready-selector "body" \
            "${capture_paths[@]}" \
            --output-dir artifacts

      - name: Upload dashboard screenshot
        id: upload-admin-dashboard
        uses: actions/upload-artifact@v7
        with:
          name: admin-dashboard
          path: artifacts/admin-desktop.png

      - name: Upload OCPP dashboard screenshot for pull requests
        if: ${{ github.event_name == 'pull_request' }}
        id: upload-ocpp-dashboard
        uses: actions/upload-artifact@v7
        with:
          name: ocpp-dashboard
          path: artifacts/ocpp-cpms-dashboard-desktop.png

      - name: Build PR screenshot comment body
        if: ${{ github.event_name == 'pull_request' }}
        run: |
          source .venv/bin/activate
          python <<'PY'
          from pathlib import Path

          marker = "<!-- dashboard-screenshot-preview -->"
          output = Path("artifacts/pr-screenshot-comment.md")
          images = sorted(Path("artifacts").glob("*.png"))
          expected_images = [
              (
                  Path("artifacts/admin-desktop.png"),
                  "Admin Desktop",
                  "${{ steps.upload-admin-dashboard.outputs.artifact-url }}",
              ),
              (
                  Path("artifacts/ocpp-cpms-dashboard-desktop.png"),
                  "Ocpp Cpms Dashboard Desktop",
                  "${{ steps.upload-ocpp-dashboard.outputs.artifact-url }}",
              ),
          ]

          lines = [
              marker,
              "## Screenshot preview",
              "",
              (
                  "Generated by the screenshot CI workflow on this pull request. "
                  "GitHub comments block inline data URI images, so previews are linked as workflow artifacts."
              ),
              "",
          ]

          if not images:
              lines.append("- ⚠️ No screenshots were produced in this run.")
          else:
              for expected_path, expected_label, _ in expected_images:
                  if not expected_path.exists():
                      lines.append(
                          f"- ⚠️ {expected_label}: expected screenshot was not produced."
                      )
              lines.append("| Screenshot | Artifact |")
              lines.append("|---|---|")

          for path, expected_label, artifact_url in expected_images:
              if not path.exists():
                  continue
              link = artifact_url.strip()
              if link:
                  lines.append(f"| {expected_label} | [Download artifact]({link}) |")
              else:
                  lines.append(f"| {expected_label} | ⚠️ Artifact URL unavailable. |")

          output.write_text("\n".join(lines), encoding="utf-8")
          PY

      - name: Upsert pull request screenshot comment
        if: ${{ github.event_name == 'pull_request' && !github.event.pull_request.head.repo.fork && github.actor != 'dependabot[bot]' }}
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- dashboard-screenshot-preview -->';
            const body = fs.readFileSync('artifacts/pr-screenshot-comment.md', 'utf8');
            const issueNumber = context.issue.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const existing = comments.find((comment) =>
              comment.user?.type === 'Bot' && comment.body?.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
              core.info(`Updated screenshot preview comment ${existing.id}.`);
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body,
            });
            core.info('Created screenshot preview comment.');

      - name: Capture public screenshot
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          source .venv/bin/activate
          python <<'PY' > /tmp/public-screenshot-paths.txt
          from pathlib import Path

          defaults = ["/", "/ocpp/c/SIM-CP-1/"]
          configured_paths_file = Path(".github/screenshot-paths.public.txt")
          configured = []

          if configured_paths_file.exists():
              for raw_line in configured_paths_file.read_text(encoding="utf-8").splitlines():
                  line = raw_line.strip()
                  if not line or line.startswith("#"):
                      continue
                  configured.append(line if line.startswith("/") else f"/{line}")

          ordered = []
          for path in defaults + configured:
              if path not in ordered:
                  ordered.append(path)

          print("\n".join(ordered))
          PY

          capture_paths=()
          while IFS= read -r path; do
            capture_paths+=("--path" "$path")
          done < /tmp/public-screenshot-paths.txt

          python manage.py preview \
            --base-url http://127.0.0.1:8888 \
            --wait-for-suite \
            --suite-timeout 60 \
            --ci-fast \
            --no-login \
            --ready-selector "body" \
            "${capture_paths[@]}" \
            --output-dir artifacts

      - name: Upload public screenshot
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: public-site
          path: artifacts/root-desktop.png

      - name: Upload OCPP dashboard screenshot
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: ocpp-dashboard
          path: artifacts/ocpp-cpms-dashboard-desktop.png

      - name: Upload EVCS public screenshot
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: evcs-public
          path: artifacts/ocpp-c-sim-cp-1-desktop.png

      - name: Stop application server
        if: always()
        run: |
          if [ -f /tmp/django-server.pid ]; then
            kill $(cat /tmp/django-server.pid) || true
            rm /tmp/django-server.pid
          fi
          if [ -f /tmp/django-server.log ]; then
            echo "Server log tail:" && tail -n 20 /tmp/django-server.log || true
          fi

  notify_failure:
    if: ${{ always() && needs.capture-dashboard.result == 'failure' && github.event_name == 'schedule' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    needs:
      - capture-dashboard
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
    steps:
      - name: Open or update screenshot failure issue
        uses: actions/github-script@v8
        with:
          script: |
            const title = 'Dashboard screenshot workflow is failing';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const runApiUrl = `${context.apiUrl}/repos/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- dashboard-screenshot-failure -->';
            let runData = null;
            let failedSteps = '';

            try {
              const { data: fetchedRunData } = await github.rest.actions.getWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
              });
              runData = fetchedRunData;

              const { data: jobsData } = await github.rest.actions.listJobsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
              });

              const failedJobs = jobsData.jobs.filter((job) => job.conclusion === 'failure');
              failedSteps = failedJobs
                .map((job) => {
                  const failedStep = (job.steps || []).find((step) => step.conclusion === 'failure');
                  if (!failedStep) {
                    return `- ${job.name}`;
                  }
                  return `- ${job.name}: ${failedStep.name}`;
                })
                .join('\n');
            } catch (error) {
              core.warning(`Failed to fetch screenshot workflow metadata: ${error.message}`);
            }

            const body = [
              marker,
              '',
              'The daily **Screenshot** workflow failed.',
              '',
              `- Workflow run: ${runUrl}`,
              `- Workflow run API: ${runApiUrl}`,
              `- Branch/ref: ${context.ref}`,
              `- Commit: ${context.sha}`,
              `- Triggered by: ${runData?.event ?? context.eventName}`,
              '',
              '## Failure details',
              '',
              failedSteps ? failedSteps : '- Unable to identify failed steps from workflow metadata.',
              '',
              'Please investigate and close this issue once resolved.',
            ].join('\n');

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const existing = openIssues.find((issue) => issue.title === title && issue.body?.includes(marker));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: [
                  'Another daily screenshot workflow failure was detected.',
                  '',
                  `- Workflow run: ${runUrl}`,
                  `- Commit: ${context.sha}`,
                  '',
                  failedSteps ? `### Failed steps\n${failedSteps}` : '### Failed steps\n- Unable to identify failed steps from workflow metadata.',
                ].join('\n'),
              });
              core.info(`Updated existing issue #${existing.number}.`);
              return;
            }

            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });
            core.info(`Created issue #${created.data.number}.`);

  notify_recovery:
    if: ${{ always() && needs.capture-dashboard.result == 'success' && github.event_name == 'schedule' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    needs:
      - capture-dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Comment and close screenshot failure issue when recovered
        uses: actions/github-script@v8
        with:
          script: |
            const title = 'Dashboard screenshot workflow is failing';
            const marker = '<!-- dashboard-screenshot-failure -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const existing = openIssues.find((issue) => issue.title === title && issue.body?.includes(marker));
            if (!existing) {
              core.info('No open screenshot workflow issue found to close.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: [
                'Daily screenshot workflow recovered successfully ✅',
                '',
                `- Passing workflow run: ${runUrl}`,
                `- Commit: ${context.sha}`,
                '',
                'Closing this issue because the screenshot workflow is now passing.',
              ].join('\n'),
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: 'closed',
            });
            core.info(`Closed screenshot workflow issue #${existing.number}.`);
