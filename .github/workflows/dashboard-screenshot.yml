name: Screenshot

env:
  PYTHONDONTWRITEBYTECODE: '1'
  PLAYWRIGHT_VERSION: '1.45.2'
  NODE_OPTIONS: '--no-deprecation'

concurrency:
  group: dashboard-screenshot-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '17 6 * * *'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  capture-dashboard:
    name: Capture admin dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Ensure workspace is writable
        run: sudo chown -R "$USER:$USER" "$GITHUB_WORKSPACE"

      - uses: actions/checkout@v6
        with:
          clean: false

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements-runtime.txt', 'requirements-preview.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Cache virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ hashFiles('requirements-runtime.txt', 'requirements-preview.txt') }}
          restore-keys: |
            venv-${{ runner.os }}-

      - name: Install suite from repository
        run: |
          ./install.sh --clean --no-start
      - name: Install preview dependencies
        run: |
          source .venv/bin/activate
          python -m pip install '.[preview]'

      - name: Prepare database and admin account
        run: |
          source .venv/bin/activate
          python manage.py migrate --noinput --database default
          python manage.py health --target core.admin --force
          python manage.py collectstatic --noinput

      - name: Seed OCPP demo data
        run: |
          source .venv/bin/activate
          python manage.py shell <<'PY'
          from decimal import Decimal
          from django.utils import timezone

          from apps.ocpp.models import Charger, MeterValue, Transaction

          now = timezone.now()
          charger, _ = Charger.objects.get_or_create(
              charger_id="SIM-CP-1",
              defaults={
                  "display_name": "Simulated Charger",
                  "connector_id": 1,
                  "public_display": True,
                  "last_status": "Charging",
                  "last_heartbeat": now,
              },
          )

          active_tx, _ = Transaction.objects.get_or_create(
              charger=charger,
              connector_id=1,
              stop_time=None,
              defaults={
                  "start_time": now - timezone.timedelta(minutes=15),
                  "received_start_time": now - timezone.timedelta(minutes=15),
                  "meter_start": 1000,
                  "ocpp_transaction_id": "SIM-ACTIVE",
              },
          )

          completed_tx, _ = Transaction.objects.get_or_create(
              charger=charger,
              connector_id=1,
              ocpp_transaction_id="SIM-COMPLETED",
              defaults={
                  "start_time": now - timezone.timedelta(hours=2),
                  "stop_time": now - timezone.timedelta(hours=1, minutes=30),
                  "received_start_time": now - timezone.timedelta(hours=2),
                  "received_stop_time": now - timezone.timedelta(hours=1, minutes=30),
                  "meter_start": 800,
                  "meter_stop": 1200,
              },
          )

          MeterValue.objects.get_or_create(
              charger=charger,
              transaction=completed_tx,
              connector_id=1,
              timestamp=completed_tx.stop_time or now,
              defaults={
                  "context": "Sample.Periodic",
                  "energy": Decimal("4.200"),
              },
          )

          MeterValue.objects.get_or_create(
              charger=charger,
              transaction=active_tx,
              connector_id=1,
              timestamp=now,
              defaults={
                  "context": "Sample.Periodic",
                  "energy": Decimal("1.800"),
              },
          )
          PY

      - name: Launch application server
        env:
          PORT: 8888
        run: |
          source .venv/bin/activate
          DJANGO_SUPPRESS_MIGRATION_CHECK=1 python manage.py runserver 0.0.0.0:"${PORT}" --noreload > /tmp/django-server.log 2>&1 &
          echo $! > /tmp/django-server.pid

          echo "Waiting for server to become healthy..."
          healthy=false
          for attempt in {1..30}; do
            if curl -fsS "http://localhost:${PORT}/admin/login/?next=/admin/" >/dev/null; then
              healthy=true
              break
            fi
            sleep 2
          done

          if [ "$healthy" = false ]; then
            echo "Server failed to start in time. Recent logs:"
            tail -n 50 /tmp/django-server.log || true
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Cache npm
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ env.PLAYWRIGHT_VERSION }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: |
          npm install --no-save playwright@"${PLAYWRIGHT_VERSION}"
          npx playwright install --with-deps chromium

      - name: Capture dashboard screenshot
        env:
          BASE_URL: http://localhost:8888/admin/login/?next=/admin/
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin
        run: |
          mkdir -p artifacts
          cat > artifacts/capture.js <<'NODE'
          const { chromium } = require('playwright');

          const baseUrl = process.env.BASE_URL || 'http://localhost:8888/admin/login/?next=/admin/';
          const username = process.env.ADMIN_USERNAME || 'admin';
          const password = process.env.ADMIN_PASSWORD || 'admin';

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();

            await page.goto(baseUrl, { waitUntil: 'domcontentloaded' });
            await page.fill('input[name="username"]', username);
            await page.fill('input[name="password"]', password);
            await Promise.all([
              page.waitForNavigation({ waitUntil: 'domcontentloaded' }),
              page.click('input[type="submit"], button[type="submit"]'),
            ]);
            await page.waitForLoadState('domcontentloaded');
            await page.screenshot({ path: 'artifacts/admin-dashboard.png', fullPage: true });

            await browser.close();
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

          node artifacts/capture.js

      - name: Upload dashboard screenshot
        uses: actions/upload-artifact@v7
        with:
          name: admin-dashboard
          path: artifacts/admin-dashboard.png

      - name: Capture public screenshot
        if: ${{ github.event_name != 'pull_request' }}
        env:
          BASE_URL: http://localhost:8888/
        run: |
          mkdir -p artifacts
          cat > artifacts/capture-public.js <<'NODE'
          const { chromium } = require('playwright');

          const baseUrl = process.env.BASE_URL || 'http://localhost:8888/';

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();

            await page.goto(baseUrl, { waitUntil: 'domcontentloaded' });
            await page.waitForLoadState('domcontentloaded');
            await page.screenshot({ path: 'artifacts/public-site.png', fullPage: true });

            await browser.close();
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

          node artifacts/capture-public.js

      - name: Upload public screenshot
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: public-site
          path: artifacts/public-site.png

      - name: Capture OCPP dashboard screenshot
        if: ${{ github.event_name != 'pull_request' }}
        env:
          BASE_URL: http://localhost:8888
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin
        run: |
          mkdir -p artifacts
          cat > artifacts/capture-ocpp.js <<'NODE'
          const { chromium } = require('playwright');

          const baseUrl = process.env.BASE_URL || 'http://localhost:8888';
          const username = process.env.ADMIN_USERNAME || 'admin';
          const password = process.env.ADMIN_PASSWORD || 'admin';
          const loginUrl = `${baseUrl}/login/?next=/ocpp/cpms/dashboard/`;
          const dashboardUrl = `${baseUrl}/ocpp/cpms/dashboard/`;

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();

            await page.goto(loginUrl, { waitUntil: 'domcontentloaded' });
            await page.fill('input[name="username"]', username);
            await page.fill('input[name="password"]', password);
            await Promise.all([
              page.waitForNavigation({ waitUntil: 'domcontentloaded' }),
              page.click('button[type="submit"], input[type="submit"]'),
            ]);

            await page.goto(dashboardUrl, { waitUntil: 'domcontentloaded' });
            await page.waitForLoadState('domcontentloaded');
            await page.waitForTimeout(1000);
            await page.screenshot({ path: 'artifacts/ocpp-dashboard.png', fullPage: true });

            await browser.close();
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

          node artifacts/capture-ocpp.js

      - name: Upload OCPP dashboard screenshot
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: ocpp-dashboard
          path: artifacts/ocpp-dashboard.png

      - name: Capture EVCS public screenshot
        if: ${{ github.event_name != 'pull_request' }}
        env:
          BASE_URL: http://localhost:8888
        run: |
          mkdir -p artifacts
          cat > artifacts/capture-evcs.js <<'NODE'
          const { chromium } = require('playwright');

          const baseUrl = process.env.BASE_URL || 'http://localhost:8888';
          const publicUrl = `${baseUrl}/ocpp/c/SIM-CP-1/`;

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();

            await page.goto(publicUrl, { waitUntil: 'domcontentloaded' });
            await page.waitForLoadState('domcontentloaded');
            await page.waitForTimeout(1000);
            await page.screenshot({ path: 'artifacts/evcs-public.png', fullPage: true });

            await browser.close();
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

          node artifacts/capture-evcs.js

      - name: Upload EVCS public screenshot
        if: ${{ github.event_name != 'pull_request' }}
        uses: actions/upload-artifact@v7
        with:
          name: evcs-public
          path: artifacts/evcs-public.png

      - name: Stop application server
        if: always()
        run: |
          if [ -f /tmp/django-server.pid ]; then
            kill $(cat /tmp/django-server.pid) || true
            rm /tmp/django-server.pid
          fi
          if [ -f /tmp/django-server.log ]; then
            echo "Server log tail:" && tail -n 20 /tmp/django-server.log || true
          fi

  notify_failure:
    if: ${{ always() && needs.capture-dashboard.result == 'failure' && github.event_name == 'schedule' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    needs:
      - capture-dashboard
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
    steps:
      - name: Open or update screenshot failure issue
        uses: actions/github-script@v8
        with:
          script: |
            const title = 'Dashboard screenshot workflow is failing';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const runApiUrl = `${context.apiUrl}/repos/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- dashboard-screenshot-failure -->';
            let runData = null;
            let failedSteps = '';

            try {
              const { data: fetchedRunData } = await github.rest.actions.getWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
              });
              runData = fetchedRunData;

              const { data: jobsData } = await github.rest.actions.listJobsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100,
              });

              const failedJobs = jobsData.jobs.filter((job) => job.conclusion === 'failure');
              failedSteps = failedJobs
                .map((job) => {
                  const failedStep = (job.steps || []).find((step) => step.conclusion === 'failure');
                  if (!failedStep) {
                    return `- ${job.name}`;
                  }
                  return `- ${job.name}: ${failedStep.name}`;
                })
                .join('\n');
            } catch (error) {
              core.warning(`Failed to fetch screenshot workflow metadata: ${error.message}`);
            }

            const body = [
              marker,
              '',
              'The daily **Screenshot** workflow failed.',
              '',
              `- Workflow run: ${runUrl}`,
              `- Workflow run API: ${runApiUrl}`,
              `- Branch/ref: ${context.ref}`,
              `- Commit: ${context.sha}`,
              `- Triggered by: ${runData?.event ?? context.eventName}`,
              '',
              '## Failure details',
              '',
              failedSteps ? failedSteps : '- Unable to identify failed steps from workflow metadata.',
              '',
              'Please investigate and close this issue once resolved.',
            ].join('\n');

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const existing = openIssues.find((issue) => issue.title === title && issue.body?.includes(marker));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: [
                  'Another daily screenshot workflow failure was detected.',
                  '',
                  `- Workflow run: ${runUrl}`,
                  `- Commit: ${context.sha}`,
                  '',
                  failedSteps ? `### Failed steps\n${failedSteps}` : '### Failed steps\n- Unable to identify failed steps from workflow metadata.',
                ].join('\n'),
              });
              core.info(`Updated existing issue #${existing.number}.`);
              return;
            }

            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });
            core.info(`Created issue #${created.data.number}.`);

  notify_recovery:
    if: ${{ always() && needs.capture-dashboard.result == 'success' && github.event_name == 'schedule' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    needs:
      - capture-dashboard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Comment and close screenshot failure issue when recovered
        uses: actions/github-script@v8
        with:
          script: |
            const title = 'Dashboard screenshot workflow is failing';
            const marker = '<!-- dashboard-screenshot-failure -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const existing = openIssues.find((issue) => issue.title === title && issue.body?.includes(marker));
            if (!existing) {
              core.info('No open screenshot workflow issue found to close.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: [
                'Daily screenshot workflow recovered successfully ✅',
                '',
                `- Passing workflow run: ${runUrl}`,
                `- Commit: ${context.sha}`,
                '',
                'Closing this issue because the screenshot workflow is now passing.',
              ].join('\n'),
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: 'closed',
            });
            core.info(`Closed screenshot workflow issue #${existing.number}.`);
