name: Create release tag from VERSION

on:
  push:
    branches:
      - main

permissions:
  actions: write
  contents: write

jobs:
  tag-from-version:
    name: Create v* tag from VERSION
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Read VERSION
        id: version
        run: |
          version="$(tr -d '[:space:]' < VERSION)"
          if [ -z "$version" ]; then
            echo "VERSION file is empty." >&2
            exit 1
          fi
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Create tag when missing
        env:
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          tag="v${VERSION}"
          if git rev-parse -q --verify "refs/tags/${tag}" >/dev/null; then
            echo "Tag ${tag} already exists; nothing to do."
            exit 0
          fi

          git tag "$tag"
          git push origin "$tag"
          echo "Created tag ${tag} from VERSION=${VERSION}."

      - name: Dispatch publish workflow for created tag
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.value }}
        run: |
          tag="v${VERSION}"
          gh workflow run publish.yml --ref "$tag" -f release_tag="$tag"
