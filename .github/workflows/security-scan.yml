name: Security Scan

env:
  NODE_OPTIONS: '--no-deprecation'

on:
  pull_request:
    paths:
      - '**/*.py'
      - '**/*.js'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.html'
      - '**/*.css'
      - '**/*.scss'
      - '.github/workflows/security-scan.yml'
      - '.github/workflows/codeql.yml'
  schedule:
    - cron: '0 2 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  zap-baseline-pr:
    name: OWASP ZAP Baseline Scan
    if: github.event_name == 'pull_request' && vars.PR_SECURITY_SCAN_TARGET != ''
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Validate PR scan target
        env:
          TARGET_URL: ${{ vars.PR_SECURITY_SCAN_TARGET }}
        run: |
          set -euo pipefail

          if [ -z "${TARGET_URL}" ]; then
            echo "PR_SECURITY_SCAN_TARGET is not configured." >&2
            exit 1
          fi

          case "${TARGET_URL}" in
            https://arthexis.com*|http://arthexis.com*|https://www.arthexis.com*|http://www.arthexis.com*)
              echo "Refusing to scan production target from pull_request context." >&2
              exit 1
              ;;
          esac

          echo "Using PR-safe scan target: ${TARGET_URL}"

      - name: Run passive ZAP baseline scan
        id: zap_scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: ${{ vars.PR_SECURITY_SCAN_TARGET }}
          cmd_options: >-
            -m 5
            -J zap-pr-report.json
            -w zap-pr-report.md
            -r zap-pr-report.html
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-baseline-pr-report

      - name: Upload PR ZAP reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zap-baseline-pr-report
          path: |
            zap-pr-report.html
            zap-pr-report.md
            zap-pr-report.json
          if-no-files-found: warn

  zap-baseline:
    name: OWASP ZAP Baseline Scan
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Run ZAP baseline scan
        id: zap_scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: https://arthexis.com
          cmd_options: >-
            -a
            -J zap-report.json
            -w zap-report.md
            -r zap-report.html
          fail_action: false
          allow_issue_writing: false
          artifact_name: zap-baseline-report

      - name: Summarize high risk alerts
        id: evaluate
        run: |
          set -euo pipefail

          report_json="zap-report.json"
          if [ ! -f "$report_json" ]; then
            echo "Report file ${report_json} not found. Ensure the ZAP scan completed successfully." >&2
            exit 1
          fi

          high_count=$(jq '[.site[]?.alerts[]? | select((.riskcode // "") == "3")] | length' "$report_json")
          echo "High risk alerts detected: $high_count"
          echo "high_alerts=${high_count}" >> "$GITHUB_OUTPUT"

          if [ "$high_count" -gt 0 ]; then
            high_summary=$(jq -r '
              .site[]?.alerts[]?
              | select((.riskcode // "") == "3")
              | "- **" + (.alert // "Unknown alert") + "**"
                + "\n  - Risk: " + (.riskdesc // "High risk")
                + "\n  - URL: " + (
                    (
                      (.instances // [])
                      | map(.uri // .url)
                      | map(select(. != null))
                      | first
                    )
                    // (.url // "N/A")
                  )
            ' "$report_json")

            printf '%s\n' "$high_summary" > high-alerts-summary.md
            {
              echo "high_alerts_summary<<EOF"
              cat high-alerts-summary.md
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            : > high-alerts-summary.md
            echo "high_alerts_summary=" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: zap-baseline-report
          path: |
            zap-report.html
            zap-report.md
            zap-report.json
            high-alerts-summary.md
          if-no-files-found: warn

      - name: Create issue for high risk alerts
        if: steps.evaluate.outputs.high_alerts != '0'
        uses: actions/github-script@v8
        env:
          HIGH_ALERTS: ${{ steps.evaluate.outputs.high_alerts }}
          ALERT_SUMMARY: ${{ steps.evaluate.outputs.high_alerts_summary }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueTitle = 'OWASP ZAP High-Risk Alerts Detected';
            const highCount = Number(process.env.HIGH_ALERTS || '0');
            const summary = process.env.ALERT_SUMMARY?.trim() || '- No alert details captured.';
            const body = [
              `The scheduled OWASP ZAP baseline scan detected **${highCount}** high-risk alert(s) for https://arthexis.com.`,
              '',
              '### Alert summary',
              summary,
              '',
              `View the full report in the workflow run artifacts: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
            ].join('\n');

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const existing = issues.find(issue => issue.title === issueTitle && !issue.pull_request);

            if (existing) {
              core.info(`Updating existing issue #${existing.number}`);
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body
              });
            } else {
              core.info('Creating a new issue for high-risk ZAP alerts');
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body
              });
            }

      - name: Fail workflow when high risk alerts are found
        if: steps.evaluate.outputs.high_alerts != '0'
        run: |
          echo "Failing workflow because ${{ steps.evaluate.outputs.high_alerts }} high-risk alert(s) were detected."
          exit 1
