name: CodeQL

on:
  push:
    branches:
      - main
      - 'release/**'
    paths:
      - '**/*.py'
      - '**/requirements*.txt'
      - '**/pyproject.toml'
      - '**/Pipfile'
      - '**/Pipfile.lock'
      - '.github/workflows/codeql.yml'
      - '.github/workflows/security-scan.yml'
      - '.github/codeql/**'
      - '.github/actions/**'
      - 'Dockerfile'
      - '**/Dockerfile'
      - '**/*.sh'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - converted_to_draft
    paths:
      - '**/*.py'
      - '**/requirements*.txt'
      - '**/pyproject.toml'
      - '**/Pipfile'
      - '**/Pipfile.lock'
      - '.github/workflows/codeql.yml'
      - '.github/workflows/security-scan.yml'
      - '.github/codeql/**'
      - '.github/actions/**'
      - 'Dockerfile'
      - '**/Dockerfile'
      - '**/*.sh'
  schedule:
    - cron: '15 3 1 * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    # Runtime expectations:
    # - Runs on relevant code, dependency, workflow, container, and script changes in PRs and protected branches.
    # - Monthly schedule preserves baseline coverage for changes that might bypass path filters.
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Upgrade pip tooling for dependency detection
        run: |
          python -m pip install --upgrade pip setuptools wheel pyyaml

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

      - name: Summarize CodeQL alerts on pull requests
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const marker = '<!-- codeql-alert-summary -->';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullNumber = context.payload.pull_request.number;

            const alerts = await github.paginate(github.rest.codeScanning.listAlertsForRepo, {
              owner,
              repo,
              state: 'open',
              pr: pullNumber,
              per_page: 100,
            });

            const formatSeverity = (alert) => {
              return alert.rule.security_severity_level || alert.rule.severity || 'unknown';
            };

            const preview = alerts.slice(0, 20).map((alert) => {
              const location = alert.most_recent_instance?.location || {};
              const path = location.path || 'n/a';
              const line = location.start_line || '?';
              const severity = formatSeverity(alert);
              return `- ${severity}: ${alert.rule.name} (${path}:${line})`;
            });

            const summaryLines = [
              marker,
              '## CodeQL alert summary',
              '',
              `Open alerts for PR #${pullNumber}: **${alerts.length}**`,
              '',
            ];

            if (preview.length) {
              summaryLines.push('Top alerts:');
              summaryLines.push(...preview);
              if (alerts.length > preview.length) {
                summaryLines.push('', `…and ${alerts.length - preview.length} more.`);
              }
            } else {
              summaryLines.push('No open CodeQL alerts detected for this pull request. ✅');
            }

            summaryLines.push('');
            summaryLines.push(`Full results: https://github.com/${owner}/${repo}/security/code-scanning`);

            const body = summaryLines.join('\n');

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: pullNumber,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) => comment.user.type === 'Bot' && comment.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: pullNumber,
                body,
              });
            }
