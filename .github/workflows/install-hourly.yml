name: Install Health Check

env:
  PYTHONDONTWRITEBYTECODE: '1'
  NODE_OPTIONS: '--no-deprecation'
  ARTHEXIS_DB_BACKEND: sqlite
  PYTEST_WORKERS: 'auto'

concurrency:
  group: install-health-check-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      OCPP_STATE_REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v6
        with:
          clean: false
      - uses: actions/setup-python@v6
        id: setup-python
        with:
          python-version: '3.13'
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements*.txt', 'pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-
      - name: Cache virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('requirements*.txt', 'pyproject.toml', 'install.sh') }}
      - name: Validate pyproject dependency ordering
        run: |
          python "$GITHUB_WORKSPACE/scripts/sort_pyproject_deps.py" --check
      - name: Validate generated requirements
        run: |
          python "$GITHUB_WORKSPACE/scripts/generate_requirements.py" --check
      - name: Install suite from repository
        run: |
          ./install.sh --no-start
      - name: Install CI dependencies
        run: |
          source .venv/bin/activate
          python -m pip install -r requirements-ci.txt
      - name: Validate migrations
        run: |
          source .venv/bin/activate
          python scripts/check_migration_conflicts.py
          python manage.py migrations check
          python manage.py migrate --noinput --database default
      - name: Create docs admin user
        env:
          DOCS_ADMIN_PASSWORD: ${{ secrets.DOCS_ADMIN_PASSWORD }}
        run: |
          set -Eeuo pipefail
          source .venv/bin/activate
          if [ -z "${DOCS_ADMIN_PASSWORD}" ]; then
            DOCS_ADMIN_PASSWORD="$(openssl rand -base64 32)"
          fi
          echo "::add-mask::${DOCS_ADMIN_PASSWORD}"
          python manage.py create_docs_admin --confirm --password "${DOCS_ADMIN_PASSWORD}"
      - name: Check import resolution
        run: |
          source .venv/bin/activate
          python scripts/check_import_resolution.py
      - name: Validate installed app manifests
        run: |
          source .venv/bin/activate
          manifest_test_file="tests/test_installed_apps_manifests.py"
          if [[ -f "$manifest_test_file" ]]; then
            pytest "$manifest_test_file" -q
          else
            echo "Manifest test file $manifest_test_file not found; skipping manifest app validation."
          fi
      - name: Run Ruff
        run: |
          source .venv/bin/activate
          ruff check --select E9,F823 .
      - name: Run import contracts
        run: |
          source .venv/bin/activate
          make lint-imports
      - name: Detect pytest xdist arguments
        run: |
          set -Eeuo pipefail
          source .venv/bin/activate
          pytest_help="$(pytest --help)"
          if grep -q -- '--dist' <<<"$pytest_help"; then
            workers="${PYTEST_WORKERS:-auto}"
            echo "PYTEST_XDIST_ARGS=-n ${workers} --dist loadfile" >> "${GITHUB_ENV}"
          else
            echo "PYTEST_XDIST_ARGS=" >> "${GITHUB_ENV}"
          fi
      - name: Run install smoke tests
        run: |
          set -Eeuo pipefail
          source .venv/bin/activate
          read -r -a xdist_args <<< "${PYTEST_XDIST_ARGS:-}"
          pytest "${xdist_args[@]}" --maxfail=1 --disable-warnings -q --timeout=180 -m "not critical and not slow and not integration" | tee pytest.log
      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: install-hourly-pytest-log
          path: pytest.log
          if-no-files-found: warn

  notify_failure:
    if: ${{ always() && needs.install.result == 'failure' }}
    needs:
      - install
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
    steps:
      - name: Open or update install failure issue
        uses: actions/github-script@v8
        with:
          script: |
            const title = 'Install health check is failing';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const runApiUrl = `${context.apiUrl}/repos/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- install-health-check-failure -->';
            let runData = null;
            let failedSteps = '';

            try {
              const { data: fetchedRunData } = await github.rest.actions.getWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId
              });
              runData = fetchedRunData;

              const { data: jobsData } = await github.rest.actions.listJobsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100
              });

              const failedJobs = jobsData.jobs.filter((job) => job.conclusion === 'failure');
              failedSteps = failedJobs
                .map((job) => {
                  const failedStep = (job.steps || []).find((step) => step.conclusion === 'failure');
                  if (!failedStep) {
                    return `- ${job.name}`;
                  }
                  return `- ${job.name}: ${failedStep.name}`;
                })
                .join('\n');
            } catch (error) {
              core.warning(`Failed to fetch install health metadata: ${error.message}`);
            }

            const body = [
              marker,
              '',
              'The hourly **Install Health Check** workflow failed.',
              '',
              `- Workflow run: ${runUrl}`,
              `- Workflow run API: ${runApiUrl}`,
              `- Branch/ref: ${context.ref}`,
              `- Commit: ${context.sha}`,
              `- Triggered by: ${runData?.event ?? context.eventName}`,
              '',
              '## Failure details',
              '',
              failedSteps ? failedSteps : '- Unable to identify failed steps from workflow metadata.',
              '',
              'Please investigate and close this issue once resolved.'
            ].join('\n');

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const existing = openIssues.find((issue) => issue.title === title && issue.body?.includes(marker));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: [
                  'Another install health check failure was detected.',
                  '',
                  `- Workflow run: ${runUrl}`,
                  `- Commit: ${context.sha}`,
                  '',
                  failedSteps ? '### Failed steps\n' + failedSteps : '### Failed steps\n- Unable to identify failed steps from workflow metadata.'
                ].join('\n')
              });
              core.info(`Updated existing issue #${existing.number}.`);
              return;
            }

            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
            core.info(`Created issue #${created.data.number}.`);

  notify_recovery:
    if: ${{ always() && needs.install.result == 'success' && github.event_name == 'schedule' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    needs:
      - install
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Comment and close install failure issue when recovered
        uses: actions/github-script@v8
        with:
          script: |
            const title = 'Install health check is failing';
            const marker = '<!-- install-health-check-failure -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const existing = openIssues.find((issue) => issue.title === title && issue.body?.includes(marker));
            if (!existing) {
              core.info('No open install health check issue found to close.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: [
                'Install health check recovered successfully ✅',
                '',
                `- Passing workflow run: ${runUrl}`,
                `- Commit: ${context.sha}`,
                '',
                'Closing this issue because the install check is now passing.'
              ].join('\n')
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: 'closed'
            });
            core.info(`Closed install health check issue #${existing.number}.`);
