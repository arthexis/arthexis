name: Install Health Check

env:
  PYTHONDONTWRITEBYTECODE: '1'
  NODE_OPTIONS: '--no-deprecation'
  PYTEST_WORKERS: 'auto'

concurrency:
  group: install-health-check-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  install:
    name: install (${{ matrix.os_flavor }}, ${{ matrix.db_backend }})
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.container_image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os_flavor: ubuntu
            container_image: ubuntu:24.04
            python_cache_version: python3.12
            db_backend: sqlite
          - os_flavor: ubuntu
            container_image: ubuntu:24.04
            python_cache_version: python3.12
            db_backend: postgres
          - os_flavor: debian
            container_image: debian:12
            python_cache_version: python3.11
            db_backend: sqlite
          - os_flavor: debian
            container_image: debian:12
            python_cache_version: python3.11
            db_backend: postgres
    permissions:
      contents: read
    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: arthexis
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d arthexis"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ARTHEXIS_DB_BACKEND: ${{ matrix.db_backend }}
      OCPP_STATE_REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: '6379'
      POSTGRES_DB: arthexis
      POSTGRES_HOST: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_PORT: '5432'
      POSTGRES_USER: postgres
    defaults:
      run:
        shell: bash
    steps:
      - name: Install base system dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            ca-certificates curl git sudo python3 python3-venv \
            libcairo2 libgdk-pixbuf-2.0-0 libpango-1.0-0 \
            libpangocairo-1.0-0 shared-mime-info
      - uses: actions/checkout@v6
        with:
          clean: true
      - uses: actions/setup-python@v6
        id: setup-python
        if: matrix.os_flavor == 'ubuntu'
        with:
          python-version: '3.12'
      - name: Select Python runtime
        run: |
          if [ '${{ matrix.os_flavor }}' = 'ubuntu' ]; then
            python_bin='${{ steps.setup-python.outputs.python-path }}'
          else
            python_bin="$(command -v python3)"
          fi
          echo "ARTHEXIS_PYTHON_BIN=${python_bin}" >> "${GITHUB_ENV}"
          echo "$(dirname "${python_bin}")" >> "${GITHUB_PATH}"
          "${python_bin}" --version
          if command -v python >/dev/null 2>&1; then
            python --version
          fi
          python3 --version
      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ matrix.os_flavor }}-${{ matrix.db_backend }}-${{ matrix.python_cache_version }}-${{ hashFiles('requirements*.txt', 'pyproject.toml', 'install.sh') }}
          restore-keys: |
            pip-${{ runner.os }}-${{ matrix.os_flavor }}-${{ matrix.db_backend }}-
            pip-${{ runner.os }}-${{ matrix.os_flavor }}-
      - name: Cache virtualenv
        uses: actions/cache@v5
        with:
          path: .venv
          key: venv-${{ runner.os }}-${{ matrix.os_flavor }}-${{ matrix.db_backend }}-${{ matrix.python_cache_version }}-${{ hashFiles('requirements*.txt', 'pyproject.toml', 'install.sh') }}
          restore-keys: |
            venv-${{ runner.os }}-${{ matrix.os_flavor }}-${{ matrix.db_backend }}-${{ matrix.python_cache_version }}-
      - name: Validate pyproject dependency ordering
        run: |
          "${ARTHEXIS_PYTHON_BIN}" "$GITHUB_WORKSPACE/scripts/sort_pyproject_deps.py" --check
      - name: Validate generated requirements
        run: |
          "${ARTHEXIS_PYTHON_BIN}" "$GITHUB_WORKSPACE/scripts/generate_requirements.py" --check
      - name: Install redis CLI
        run: |
          if command -v sudo >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends redis-tools
          else
            apt-get update
            apt-get install -y --no-install-recommends redis-tools
          fi
      - name: Install suite from repository
        run: |
          ./install.sh --embedded --no-start
      - name: Refresh environment dependencies
        run: |
          ./env-refresh.sh
      - name: Install CI dependencies
        run: |
          ./scripts/preflight-env.sh
          source .venv/bin/activate
          python -m pip install --only-binary=:all: -r requirements-ci.txt
      - name: Verify editable install import
        run: |
          source .venv/bin/activate
          python scripts/check_editable_install_import.py
      - name: Validate migrations
        run: |
          ./scripts/preflight-env.sh
          source .venv/bin/activate
          python scripts/check_migration_conflicts.py
          python manage.py migrations check
          python manage.py migrate --noinput --database default
      - name: Create docs admin user
        env:
          DOCS_ADMIN_PASSWORD: ${{ secrets.DOCS_ADMIN_PASSWORD }}
        run: |
          set -Eeuo pipefail
          source .venv/bin/activate
          if [ -z "${DOCS_ADMIN_PASSWORD}" ]; then
            DOCS_ADMIN_PASSWORD="$(openssl rand -base64 32)"
          fi
          echo "::add-mask::${DOCS_ADMIN_PASSWORD}"
          python manage.py create_docs_admin --confirm --password "${DOCS_ADMIN_PASSWORD}"
      - name: Check import resolution
        run: |
          source .venv/bin/activate
          python scripts/check_import_resolution.py
      - name: Validate installed app manifests
        run: |
          ./scripts/preflight-env.sh --pytest
          source .venv/bin/activate
          manifest_test_file="tests/test_installed_apps_manifests.py"
          if [[ -f "$manifest_test_file" ]]; then
            python -m pytest "$manifest_test_file" -q
          else
            echo "Manifest test file $manifest_test_file not found; skipping manifest app validation."
          fi
      - name: Run Ruff
        run: |
          source .venv/bin/activate
          ruff check --select E9,F823 .
      - name: Run import contracts
        run: |
          source .venv/bin/activate
          lint-imports
      - name: Detect pytest xdist arguments
        run: |
          set -Eeuo pipefail
          source .venv/bin/activate
          pytest_help="$(python -m pytest --help)"
          if grep -q -- '--dist' <<<"$pytest_help"; then
            workers="${PYTEST_WORKERS:-auto}"
            echo "PYTEST_XDIST_ARGS=-n ${workers} --dist loadfile" >> "${GITHUB_ENV}"
          else
            echo "PYTEST_XDIST_ARGS=" >> "${GITHUB_ENV}"
          fi
      - name: Run install smoke tests
        run: |
          set -Eeuo pipefail
          ./scripts/preflight-env.sh --pytest
          source .venv/bin/activate
          read -r -a xdist_args <<< "${PYTEST_XDIST_ARGS:-}"
          python -m pytest "${xdist_args[@]}" --maxfail=1 --disable-warnings -q --timeout=300 --junitxml=pytest-junit.xml | tee pytest.log
      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: install-health-pytest-results-${{ matrix.os_flavor }}-${{ matrix.db_backend }}
          path: |
            pytest.log
            pytest-junit.xml
          if-no-files-found: warn
  notify_failure:
    if: ${{ always() && needs.install.result == 'failure' }}
    needs:
      - install
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: write
    steps:
      - name: Open or update install failure issue
        uses: actions/github-script@v9
        with:
          script: |
            const title = 'Install health check is failing';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const runApiUrl = `${context.apiUrl}/repos/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- install-health-check-failure -->';
            let runData = null;
            let failedSteps = '';
            let failedTargets = '';
            let failedJobCount = 0;

            try {
              const { data: fetchedRunData } = await github.rest.actions.getWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId
              });
              runData = fetchedRunData;

              const { data: jobsData } = await github.rest.actions.listJobsForWorkflowRun({
                owner: context.repo.owner,
                repo: context.repo.repo,
                run_id: context.runId,
                per_page: 100
              });

              const failedJobs = jobsData.jobs.filter((job) => job.conclusion === 'failure');
              const failedTargetSet = new Set();
              failedJobs.forEach((job) => {
                const match = /^install \((.+)\)$/.exec(job.name || '');
                if (match?.[1]) {
                  failedTargetSet.add(match[1]);
                }
              });
              failedTargets = Array.from(failedTargetSet).sort().join(', ');
              failedJobCount = failedJobs.length;
              failedSteps = failedJobs
                .map((job) => {
                  const failedStep = (job.steps || []).find((step) => step.conclusion === 'failure');
                  const jobUrl = job.html_url ? ` [job logs](${job.html_url})` : '';
                  const timing = job.started_at && job.completed_at
                    ? ` (started: ${job.started_at}, completed: ${job.completed_at})`
                    : '';
                  if (!failedStep) {
                    return `- ${job.name}${jobUrl}${timing}`;
                  }
                  return `- ${job.name}: ${failedStep.name}${jobUrl}${timing}`;
                })
                .join('\n');
            } catch (error) {
              core.warning(`Failed to fetch install health metadata: ${error.message}`);
            }

            const body = [
              marker,
              '',
              'The **Install Health Check** workflow failed.',
              '',
              `- Workflow run: ${runUrl}`,
              `- Workflow run API: ${runApiUrl}`,
              `- Branch/ref: ${context.ref}`,
              `- Commit: ${context.sha}`,
              `- Triggered by: ${runData?.event ?? context.eventName}`,
              `- Run attempt: ${runData?.run_attempt ?? 1}`,
              `- Actor: ${runData?.actor?.login ?? context.actor}`,
              '',
              '## Failure details',
              '',
              failedTargets ? `- Failed matrix targets: ${failedTargets}` : '- Failed matrix targets: Unable to determine failed matrix targets from workflow metadata.',
              failedJobCount ? `- Failed jobs: ${failedJobCount}` : '- Failed jobs: Unable to determine failed jobs from workflow metadata.',
              '',
              failedSteps ? failedSteps : '- Unable to identify failed steps from workflow metadata.',
            ].join('\n');

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const existing = openIssues.find((issue) => issue.title === title && issue.body?.includes(marker));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: [
                  'Another install health check failure was detected.',
                  '',
                  `- Workflow run: ${runUrl}`,
                  `- Commit: ${context.sha}`,
                  `- Run attempt: ${runData?.run_attempt ?? 1}`,
                  '',
                  failedTargets ? `### Failed matrix targets\n- ${failedTargets}` : '### Failed matrix targets\n- Unable to determine failed matrix targets from workflow metadata.',
                  failedJobCount ? `### Failed jobs\n- ${failedJobCount}` : '### Failed jobs\n- Unable to determine failed jobs from workflow metadata.',
                  '',
                  failedSteps ? '### Failed steps\n' + failedSteps : '### Failed steps\n- Unable to identify failed steps from workflow metadata.'
                ].join('\n')
              });
              core.info(`Updated existing issue #${existing.number}.`);
              return;
            }

            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
            core.info(`Created issue #${created.data.number}.`);

  notify_recovery:
    if: ${{ always() && needs.install.result == 'success' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    needs:
      - install
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Comment and close install failure issue when recovered
        uses: actions/github-script@v9
        with:
          script: |
            const title = 'Install health check is failing';
            const marker = '<!-- install-health-check-failure -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            const existing = openIssues.find((issue) => issue.title === title && issue.body?.includes(marker));
            if (!existing) {
              core.info('No open install health check issue found to close.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: [
                'Install health check recovered successfully ✅',
                '',
                `- Passing workflow run: ${runUrl}`,
                `- Commit: ${context.sha}`,
                '',
                'Closing this issue because the install check is now passing.'
              ].join('\n')
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: 'closed'
            });
            core.info(`Closed install health check issue #${existing.number}.`);
