name: Prepare Release PR

on:
  workflow_dispatch:
    inputs:
      bump_level:
        description: "Release bump level. Use auto unless maintainers need to force a higher level."
        required: true
        default: auto
        type: choice
        options:
          - auto
          - patch
          - minor
          - major
      dry_run:
        description: "Plan the release without pushing a branch or opening a PR."
        required: false
        default: false
        type: boolean
  workflow_run:
    workflows:
      - Release Simulator
    types:
      - completed

permissions:
  contents: write
  issues: read
  pull-requests: write

concurrency:
  group: prepare-release-pr
  cancel-in-progress: false

jobs:
  prepare-release-pr:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout default branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Resolve latest release tag
        id: latest_release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest_tag="$(gh release list --limit 1 --json tagName --jq '.[0].tagName // ""')"
          echo "tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          if [ -n "$latest_tag" ]; then
            echo "Latest release tag: ${latest_tag}"
          else
            echo "No published release found."
          fi

      - name: Gate automatic runs on readiness report
        id: readiness
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch bypasses readiness-report gating."
            exit 0
          fi

          report_body="$(
            gh issue list \
              --state open \
              --search "Release Readiness Report in:title" \
              --json body \
              --jq 'map(select(.body | contains("<!-- release-readiness-report -->")))[0].body // ""'
          )"
          if [ -z "$report_body" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "No open release readiness report found."
            exit 0
          fi
          if [[ "$report_body" == *"## Release readiness blockers"* && "$report_body" == *"- None detected."* && "$report_body" == *"Recommendation: release can proceed"* ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "Release readiness report allows automatic prepare PR creation."
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Release readiness report is not ready for automatic prepare PR creation."
          fi

      - name: Plan next release version
        id: plan
        if: ${{ steps.readiness.outputs.ready == 'true' }}
        env:
          BASE_REF: ${{ steps.latest_release.outputs.tag }}
          BUMP_LEVEL: ${{ github.event.inputs.bump_level || 'auto' }}
        run: |
          args=(
            --root .
            --package-name arthexis
            --version-file VERSION
            --head-ref HEAD
            --bump-level "$BUMP_LEVEL"
            --write-version
            --github-output "$GITHUB_OUTPUT"
            --summary-file release-version-plan.md
          )
          if [ -n "$BASE_REF" ]; then
            args+=(--base-ref "$BASE_REF")
          fi
          python -m scripts.release.plan_version "${args[@]}"

      - name: Stop when no release PR is needed
        if: ${{ steps.readiness.outputs.ready != 'true' || steps.plan.outputs.version_bumped != 'true' }}
        run: |
          echo "No release prepare PR is needed for this run."

      - name: Build release PR body
        if: ${{ steps.readiness.outputs.ready == 'true' && steps.plan.outputs.version_bumped == 'true' }}
        env:
          NEXT_VERSION: ${{ steps.plan.outputs.next_version }}
          BUMP_LEVEL: ${{ steps.plan.outputs.bump_level }}
        run: |
          {
            echo "## Release v${NEXT_VERSION}"
            echo ""
            echo "This PR was generated by the Prepare Release PR workflow."
            echo ""
            echo "- Bump level: \`${BUMP_LEVEL}\`"
            echo "- Source workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            if [ "${{ github.event_name }}" = "workflow_run" ]; then
              echo "- Triggering simulator run: ${{ github.event.workflow_run.html_url }}"
            fi
            echo ""
            cat release-version-plan.md
            echo ""
            echo "After this PR merges, tag-from-version creates the matching tag and dispatches publish.yml. The PyPI environment approval gate remains manual."
          } > release-pr-body.md

      - name: Push branch and open or update PR
        if: ${{ steps.readiness.outputs.ready == 'true' && steps.plan.outputs.version_bumped == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.dry_run != 'true') }}
        env:
          GH_TOKEN: ${{ github.token }}
          NEXT_VERSION: ${{ steps.plan.outputs.next_version }}
        run: |
          branch="release/prepare-v${NEXT_VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$branch"
          git add VERSION
          git commit -m "Prepare release v${NEXT_VERSION}"
          git push --force-with-lease origin "HEAD:${branch}"

          existing_pr="$(gh pr list --head "$branch" --json number --jq '.[0].number // ""')"
          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" --title "Release v${NEXT_VERSION}" --body-file release-pr-body.md
            echo "Updated existing release PR #${existing_pr}."
          else
            gh pr create \
              --base "${{ github.event.repository.default_branch }}" \
              --head "$branch" \
              --title "Release v${NEXT_VERSION}" \
              --body-file release-pr-body.md
          fi
