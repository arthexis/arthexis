name: Release Simulator

on:
  schedule:
    - cron: '15 * * * *'
  workflow_dispatch:
  push: {}

concurrency:
  group: release-simulator-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  mark_outdated_on_default_branch_change:
    if: ${{ github.event_name == 'push' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Close open release readiness report as outdated
        uses: actions/github-script@v9
        with:
          script: |
            const title = 'Release Readiness Report';
            const marker = '<!-- release-readiness-report -->';
            const defaultBranch = context.payload.repository?.default_branch || 'default branch';
            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const existing = openIssues.find((issue) => issue.title === title && issue.body?.includes(marker));
            if (!existing) {
              core.info('No open release readiness report issue found to close.');
              return;
            }

            const { data: repoLabels } = await github.rest.issues.listLabelsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const outdatedLabelExists = repoLabels.some((label) => label.name === 'outdated');
            if (outdatedLabelExists) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                labels: ['outdated'],
              });
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: [
                `Marking this report as outdated because \`${defaultBranch}\` changed.`,
                '',
                `- New default-branch commit: ${context.sha}`,
                `- Push event: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                '',
                'A fresh release readiness report will be created on the next scheduled simulator run.'
              ].join('\n')
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: 'closed',
            });

  evaluate:
    if: ${{ github.event_name != 'push' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: read
      pull-requests: read
      security-events: read
    outputs:
      should_run: ${{ steps.evaluate.outputs.should_run }}
      skip_reason: ${{ steps.evaluate.outputs.skip_reason }}
      can_simulate: ${{ steps.evaluate.outputs.can_simulate }}
      blockers_json: ${{ steps.evaluate.outputs.blockers_json }}
      default_branch: ${{ steps.evaluate.outputs.default_branch }}
    steps:
      - name: Evaluate release blockers from install/upgrade pipeline state
        id: evaluate
        uses: actions/github-script@v9
        with:
          script: |
            const installIssueTitle = 'Install health check is failing';
            const installMarker = '<!-- install-health-check-failure -->';
            const releaseReadinessReportTitle = 'Release Readiness Report';
            const releaseReadinessReportMarker = '<!-- release-readiness-report -->';
            const defaultBranch = context.payload.repository.default_branch;
            const blockers = [];
            const fullDayMillis = 24 * 60 * 60 * 1000;
            const releaseCutoffMillis = 3 * fullDayMillis;
            const securityScanQuietMillis = 2 * 60 * 60 * 1000;
            const blockingIssueLabel = "enhancement";
            let shouldRun = true;
            let skipReason = '';

            try {
              const { data: latestRelease } = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });

              const releaseCompletedAt = latestRelease.published_at || latestRelease.created_at;
              const { data: comparison } = await github.rest.repos.compareCommits({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: latestRelease.tag_name,
                head: defaultBranch,
              });

              if (!comparison.ahead_by) {
                const ageMillis = releaseCompletedAt
                  ? Date.now() - Date.parse(releaseCompletedAt)
                  : 0;

                if (releaseCompletedAt && ageMillis >= releaseCutoffMillis) {
                  shouldRun = false;
                  skipReason = `Latest release ${latestRelease.tag_name} is at least three full days old and there are no new commits on ${defaultBranch}.`;
                } else {
                  shouldRun = false;
                  skipReason = `No new commits on ${defaultBranch} since ${latestRelease.tag_name}; a new release is not currently needed.`;
                }
              }
            } catch (error) {
              if (error.status === 404) {
                core.info('No releases exist yet; continuing with release readiness checks.');
              } else {
                throw error;
              }
            }

            if (shouldRun) {
              const openIssues = await github.paginate(github.rest.issues.listForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
              });

              const installFailureIssue = openIssues.find((issue) => issue.title === installIssueTitle && issue.body?.includes(installMarker));
              if (installFailureIssue) {
                blockers.push(`Open install failure issue: #${installFailureIssue.number}`);
              }

              const openBlockingIssues = openIssues.filter((issue) => {
                if (issue.pull_request) {
                  return false;
                }
                if (issue.title === releaseReadinessReportTitle && issue.body?.includes(releaseReadinessReportMarker)) {
                  return false;
                }
                const labels = Array.isArray(issue.labels) ? issue.labels : [];
                return !labels.some((label) => (label?.name || '').toLowerCase() === blockingIssueLabel);
              });
              if (openBlockingIssues.length) {
                const issueList = openBlockingIssues
                  .slice(0, 10)
                  .map((issue) => `#${issue.number}`)
                  .join(', ');
                const moreCount = openBlockingIssues.length - 10;
                const moreSuffix = moreCount > 0 ? `, and ${moreCount} more` : '';
                blockers.push(`Open non-enhancement issues: ${issueList}${moreSuffix}.`);
              }

              const openPullRequests = await github.paginate(github.rest.pulls.list, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                per_page: 100,
              });
              if (openPullRequests.length) {
                const pullList = openPullRequests
                  .slice(0, 10)
                  .map((pull) => `#${pull.number}`)
                  .join(', ');
                const moreCount = openPullRequests.length - 10;
                const moreSuffix = moreCount > 0 ? `, and ${moreCount} more` : '';
                blockers.push(`Open pull requests: ${pullList}${moreSuffix}.`);
              }

              const { data: defaultBranchData } = await github.rest.repos.getBranch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: defaultBranch,
              });
              const defaultBranchSha = defaultBranchData?.commit?.sha || context.sha;
              const ciRuns = await github.paginate(github.rest.actions.listWorkflowRunsForRepo, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: defaultBranch,
                per_page: 100,
              });

              const defaultBranchHeadPushRuns = ciRuns
                .filter((run) => run.head_sha === defaultBranchSha && run.event === 'push' && run.created_at)
                .sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
              const defaultBranchAdvancedAt = defaultBranchHeadPushRuns[0]?.created_at;

              if (defaultBranchAdvancedAt) {
                const advancedTime = Date.parse(defaultBranchAdvancedAt);
                const quietUntil = new Date(advancedTime + securityScanQuietMillis);
                const quietAgeMillis = Date.now() - advancedTime;
                if (quietAgeMillis < securityScanQuietMillis) {
                  blockers.push(`Security scan settling period has not elapsed since ${defaultBranch} advanced to commit ${defaultBranchSha}; wait until ${quietUntil.toISOString()}.`);
                }
              } else {
                blockers.push(`Unable to verify when ${defaultBranch} advanced to commit ${defaultBranchSha} before security scan readiness.`);
              }

              try {
                const codeScanningAlerts = await github.paginate(github.rest.codeScanning.listAlertsForRepo, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: 'open',
                  per_page: 100,
                });

                if (codeScanningAlerts.length) {
                  blockers.push(`Open GitHub code scanning security findings: ${codeScanningAlerts.length}.`);
                }
              } catch (error) {
                blockers.push(`Unable to verify GitHub code scanning alerts before release readiness: ${error.message}`);
              }

              const installHealthRunsForHead = ciRuns
                .filter((run) => run.name === 'Install Health Check' && run.head_sha === defaultBranchSha)
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
              const latestInstallHealthRun = installHealthRunsForHead[0];

              if (!latestInstallHealthRun) {
                blockers.push(`Install Health Check has not run for current ${defaultBranch} commit ${defaultBranchSha}.`);
              } else if (latestInstallHealthRun.status !== 'completed') {
                blockers.push(`Install Health Check for current ${defaultBranch} commit ${defaultBranchSha} is ${latestInstallHealthRun.status}: ${latestInstallHealthRun.html_url}`);
              } else if (latestInstallHealthRun.conclusion !== 'success') {
                blockers.push(`Install Health Check for current ${defaultBranch} commit ${defaultBranchSha} completed with ${latestInstallHealthRun.conclusion}: ${latestInstallHealthRun.html_url}`);
              }

              const latestCiRun = ciRuns
                .filter((run) => run.name === 'Upgrade Gate')
                .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0];

              if (latestCiRun && latestCiRun.conclusion === 'failure') {
                let upgradeFailed = false;
                try {
                  const { data: jobsData } = await github.rest.actions.listJobsForWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    run_id: latestCiRun.id,
                    per_page: 100,
                  });
                  upgradeFailed = jobsData.jobs.some((job) => (job.name || '').toLowerCase().includes('upgrade') && job.conclusion === 'failure');
                } catch (error) {
                  core.warning(`Unable to inspect CI jobs for run ${latestCiRun.id}: ${error.message}`);
                }

                if (upgradeFailed) {
                  blockers.push(`Latest CI upgrade gate failed: ${latestCiRun.html_url}`);
                }
              }
            } else {
              core.info(`Skipping release readiness check: ${skipReason}`);
            }

            const canSimulate = shouldRun && blockers.length === 0;
            core.setOutput('should_run', shouldRun ? 'true' : 'false');
            core.setOutput('skip_reason', skipReason);
            core.setOutput('can_simulate', canSimulate ? 'true' : 'false');
            core.setOutput('blockers_json', JSON.stringify(blockers));
            core.setOutput('default_branch', defaultBranch);

  simulate_release:
    if: ${{ github.event_name != 'push' && needs.evaluate.outputs.should_run == 'true' }}
    needs:
      - evaluate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      simulated_ok: ${{ steps.finalize.outputs.simulated_ok }}
      summary_markdown: ${{ steps.finalize.outputs.summary_markdown }}
    steps:
      - uses: actions/checkout@v6
        with:
          clean: false
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Resolve simulation version against PyPI
        id: resolve_simulation_version
        if: ${{ needs.evaluate.outputs.can_simulate == 'true' }}
        run: |
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path
          from urllib.error import HTTPError, URLError
          from urllib.request import urlopen

          package_name = 'arthexis'
          version_path = Path('VERSION')
          current_version = version_path.read_text(encoding='utf-8').strip()
          pypi_url = f'https://pypi.org/pypi/{package_name}/json'
          semver_re = re.compile(r'^(?:(?P<epoch>\d+)!)?(?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)(?:[+].*)?$')


          def parse_version(value: str):
              match = semver_re.match(value.strip())
              if not match:
                  raise SystemExit(
                      f'Release simulation blocked: cannot parse semver from VERSION value {value!r}.'
                  )
              groups = match.groupdict()
              return (
                  int(groups['epoch'] or 0),
                  int(groups['major']),
                  int(groups['minor']),
                  int(groups['patch']),
              )


          def serialize_version(parts):
              epoch, major, minor, patch = parts
              value = f'{major}.{minor}.{patch}'
              return f'{epoch}!{value}' if epoch else value


          def bump_patch(parts):
              epoch, major, minor, patch = parts
              return epoch, major, minor, patch + 1


          try:
              with urlopen(pypi_url, timeout=15) as response:
                  payload = json.load(response)
          except HTTPError as exc:
              if exc.code == 404:
                  payload = {'releases': {}}
              else:
                  raise SystemExit(
                      'Release simulation blocked: unable to verify existing PyPI versions '
                      f'(HTTP {exc.code} from {pypi_url}).'
                  ) from exc
          except URLError as exc:
              raise SystemExit(
                  'Release simulation blocked: network failure while checking PyPI for an existing release '
                  f'({exc.reason}).'
              ) from exc

          releases = payload.get('releases', {})
          current_parts = parse_version(current_version)
          published_parts = []
          for release in releases.keys():
              try:
                  parsed = parse_version(release)
              except SystemExit:
                  continue
              published_parts.append(parsed)

          published_parts_by_version = {
              serialize_version(parts): parts
              for parts in published_parts
          }

          candidate_parts = current_parts
          if published_parts:
              candidate_parts = max(published_parts + [current_parts])
          candidate_version = serialize_version(candidate_parts)

          simulated_version = current_version
          if candidate_version in published_parts_by_version or current_version in published_parts_by_version:
              simulated_parts = bump_patch(candidate_parts)
              simulated_version = serialize_version(simulated_parts)
              while simulated_version in published_parts_by_version:
                  simulated_parts = bump_patch(parse_version(simulated_version))
                  simulated_version = serialize_version(simulated_parts)

          if simulated_version != current_version:
              version_path.write_text(simulated_version + '\n', encoding='utf-8')
              print(
                  f'Release simulation adjusted VERSION from {current_version!r} to {simulated_version!r} '
                  'because the candidate version already exists on PyPI.'
              )
          else:
              print(f'Simulated release version {simulated_version!r} is not yet published on PyPI.')

          with open(Path(os.environ['GITHUB_OUTPUT']), 'a', encoding='utf-8') as output:
              output.write(f'version_bumped={str(simulated_version != current_version).lower()}\n')
              output.write(f'previous_version={current_version}\n')
              output.write(f'simulated_version={simulated_version}\n')
          PY
      - name: Validate release tag version gate (simulated)
        id: validate_version_gate
        if: ${{ needs.evaluate.outputs.can_simulate == 'true' }}
        run: |
          python - <<'PY'
          from pathlib import Path
          import tomllib

          root = Path('.')
          expected_version = (root / 'VERSION').read_text(encoding='utf-8').strip()
          pyproject = tomllib.loads((root / 'pyproject.toml').read_text(encoding='utf-8'))
          dynamic_version_files = (
              pyproject.get('tool', {})
              .get('setuptools', {})
              .get('dynamic', {})
              .get('version', {})
              .get('file', [])
          )
          if isinstance(dynamic_version_files, str):
              dynamic_version_files = [dynamic_version_files]

          if dynamic_version_files:
              dynamic_path = root / dynamic_version_files[0]
              dynamic_version = dynamic_path.read_text(encoding='utf-8').strip()
              if dynamic_version != expected_version:
                  raise SystemExit(
                      'Release simulation blocked: VERSION and setuptools dynamic version file differ. '
                      f'VERSION={expected_version!r}; {dynamic_path}={dynamic_version!r}.'
                  )

          print(f'Simulated tag/version gate passed for VERSION={expected_version!r}.')
          PY
      - name: Preflight PyPI version availability (simulated)
        id: preflight_pypi
        if: ${{ needs.evaluate.outputs.can_simulate == 'true' }}
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from urllib.error import HTTPError, URLError
          from urllib.request import urlopen

          package_name = 'arthexis'
          package_version = Path('VERSION').read_text(encoding='utf-8').strip()
          pypi_url = f'https://pypi.org/pypi/{package_name}/json'

          try:
              with urlopen(pypi_url, timeout=15) as response:
                  payload = json.load(response)
          except HTTPError as exc:
              if exc.code == 404:
                  payload = {'releases': {}}
              else:
                  raise SystemExit(
                      'Release simulation blocked: unable to verify existing PyPI versions '
                      f'(HTTP {exc.code} from {pypi_url}).'
                  ) from exc
          except URLError as exc:
              raise SystemExit(
                  'Release simulation blocked: network failure while checking PyPI for an existing release '
                  f'({exc.reason}).'
              ) from exc

          releases = payload.get('releases', {})
          if package_version in releases:
              raise SystemExit(
                  f'Release simulation blocked: {package_name} {package_version} is still available on PyPI '
                  'after simulated version advancement. Please rerun manually.'
              )

          print(f'Simulated PyPI preflight passed for {package_name} {package_version}.')
          PY
      - name: Install build backend
        id: install_build_backend
        if: ${{ needs.evaluate.outputs.can_simulate == 'true' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install build twine
      - name: Build sdist and wheel (simulated)
        id: build_package
        if: ${{ needs.evaluate.outputs.can_simulate == 'true' }}
        run: |
          python -m build
      - name: Validate package metadata (simulated)
        id: validate_metadata
        if: ${{ needs.evaluate.outputs.can_simulate == 'true' }}
        run: |
          python -m twine check dist/*
      - name: Stop before authorization-required publish step
        id: authorization_boundary
        if: ${{ needs.evaluate.outputs.can_simulate == 'true' }}
        run: |
          echo "Release simulator intentionally stopped before PyPI trusted-publisher authorization/publish."
      - name: Generate release simulation summary
        id: finalize
        if: ${{ always() }}
        run: |
          if [ "${{ needs.evaluate.outputs.can_simulate }}" = "true" ]; then
            if [ "${{ job.status }}" = "success" ]; then
              VERSION_BUMPED="${{ steps.resolve_simulation_version.outputs.version_bumped }}"
              SIMULATED_VERSION="${{ steps.resolve_simulation_version.outputs.simulated_version }}"
              PREVIOUS_VERSION="${{ steps.resolve_simulation_version.outputs.previous_version }}"
              {
                echo 'summary_markdown<<EOF'
                echo '### Simulation result'
                echo ''
                echo '- ✅ Release simulation reached the authorization boundary successfully.'
                if [ "$VERSION_BUMPED" = "true" ]; then
                  echo "- ℹ️ Simulation version advanced from \`$PREVIOUS_VERSION\` to \`$SIMULATED_VERSION\` to avoid an existing PyPI version."
                fi
                echo '- ℹ️ Publish to PyPI was intentionally skipped because authorization is required.'
                echo '- ✅ Recommendation: release is ready if maintainers approve and trigger a real publish.'
                echo 'EOF'
                echo 'simulated_ok=true'
              } >> "$GITHUB_OUTPUT"
            else
              FAILED_STEP='the simulation pipeline'
              if [ "${{ steps.resolve_simulation_version.outcome }}" = "failure" ]; then
                FAILED_STEP='resolve_simulation_version'
              elif [ "${{ steps.validate_version_gate.outcome }}" = "failure" ]; then
                FAILED_STEP='validate_version_gate'
              elif [ "${{ steps.preflight_pypi.outcome }}" = "failure" ]; then
                FAILED_STEP='preflight_pypi'
              elif [ "${{ steps.install_build_backend.outcome }}" = "failure" ]; then
                FAILED_STEP='install_build_backend'
              elif [ "${{ steps.build_package.outcome }}" = "failure" ]; then
                FAILED_STEP='build_package'
              elif [ "${{ steps.validate_metadata.outcome }}" = "failure" ]; then
                FAILED_STEP='validate_metadata'
              elif [ "${{ steps.authorization_boundary.outcome }}" = "failure" ]; then
                FAILED_STEP='authorization_boundary'
              fi
              {
                echo 'summary_markdown<<EOF'
                echo '### Simulation result'
                echo ''
                echo '- ❌ Release simulation failed before reaching the authorization boundary.'
                echo "- ❌ First failing step: \`$FAILED_STEP\`."
                echo "- 🔎 Inspect this workflow run for detailed logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
                echo 'EOF'
                echo 'simulated_ok=false'
              } >> "$GITHUB_OUTPUT"
            fi
          else
            {
              echo 'summary_markdown<<EOF'
              echo '### Simulation result'
              echo ''
              echo '- ⏭️ Release simulation was skipped because release readiness blockers are open.'
              echo 'EOF'
              echo 'simulated_ok=false'
            } >> "$GITHUB_OUTPUT"
          fi

  report:
    if: ${{ always() && github.event_name != 'push' && needs.evaluate.outputs.should_run == 'true' }}
    needs:
      - evaluate
      - simulate_release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Create or update release readiness report issue
        uses: actions/github-script@v9
        env:
          BLOCKERS_JSON: ${{ needs.evaluate.outputs.blockers_json }}
          CAN_SIMULATE: ${{ needs.evaluate.outputs.can_simulate }}
          SIMULATED_OK: ${{ needs.simulate_release.outputs.simulated_ok }}
          SIM_SUMMARY: ${{ needs.simulate_release.outputs.summary_markdown }}
        with:
          script: |
            const title = 'Release Readiness Report';
            const marker = '<!-- release-readiness-report -->';
            const crypto = require('crypto');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const blockers = JSON.parse(process.env.BLOCKERS_JSON || '[]');
            const canSimulate = process.env.CAN_SIMULATE === 'true';
            const simulatedOk = process.env.SIMULATED_OK === 'true';
            const simulationSummary = process.env.SIM_SUMMARY || [
              '### Simulation result',
              '',
              '- ❌ Release simulation failed before producing a summary. Check the workflow run logs.'
            ].join('\n');

            const blockerSection = blockers.length
              ? blockers.map((blocker) => `- ${blocker}`).join('\n')
              : '- None detected.';

            const recommendation = blockers.length
              ? '❌ Do not release yet. Resolve blockers and wait for the next simulator run.'
              : simulatedOk
                ? '✅ Recommendation: release can proceed once maintainers approve authorization.'
                : '⚠️ No release readiness blockers were found, but release simulation did not complete.';

            const reportFingerprint = crypto
              .createHash('sha256')
              .update(JSON.stringify({
                blockers,
                canSimulate,
                commit: context.sha,
                recommendation,
                ref: context.ref,
                simulatedOk,
                simulationSummary,
              }))
              .digest('hex');
            const fingerprintMarker = `<!-- release-readiness-fingerprint:${reportFingerprint} -->`;

            const body = [
              marker,
              fingerprintMarker,
              '',
              'Automated release readiness report. Runs hourly and only proceeds after the default branch has remained unchanged for at least two hours.',
              '',
              `- Workflow run: ${runUrl}`,
              `- Ref: ${context.ref}`,
              `- Commit: ${context.sha}`,
              `- Event: ${context.eventName}`,
              '',
              '## Release readiness blockers',
              blockerSection,
              '',
              canSimulate ? '## Release simulation' : '## Release simulation',
              canSimulate ? simulationSummary : '- Skipped because release readiness blockers are currently open.',
              '',
              '## Recommendation',
              recommendation,
            ].join('\n');

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const existing = openIssues.find((issue) => issue.title === title && issue.body?.includes(marker));
            if (existing) {
              const reportUnchanged = existing.body?.includes(fingerprintMarker);
              if (reportUnchanged) {
                core.info(`Release readiness report #${existing.number} already has unchanged content; skipping refresh comment.`);
                return;
              }
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: [
                  'Release readiness report refreshed.',
                  '',
                  `- Workflow run: ${runUrl}`,
                  `- Recommendation: ${recommendation}`,
                ].join('\n'),
              });
              core.info(`Updated existing issue #${existing.number}.`);
              return;
            }

            const created = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });
            core.info(`Created issue #${created.data.number}.`);

  close_report_when_not_needed:
    if: ${{ github.event_name != 'push' && needs.evaluate.outputs.should_run != 'true' }}
    needs:
      - evaluate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Close open release readiness report when checks are not needed
        uses: actions/github-script@v9
        env:
          SKIP_REASON: ${{ needs.evaluate.outputs.skip_reason }}
        with:
          script: |
            const title = 'Release Readiness Report';
            const marker = '<!-- release-readiness-report -->';
            const skipReason = process.env.SKIP_REASON || 'Release readiness check skipped by policy.';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });

            const existing = openIssues.find((issue) => issue.title === title && issue.body?.includes(marker));
            if (!existing) {
              core.info('No open release readiness report issue found to close.');
              return;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              body: [
                'Closing this report because release readiness checks are currently not needed.',
                '',
                `- Reason: ${skipReason}`,
                `- Workflow run: ${runUrl}`,
              ].join('\n'),
            });

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: existing.number,
              state: 'closed',
            });
