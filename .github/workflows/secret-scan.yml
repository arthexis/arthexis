name: Secret Scan

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - converted_to_draft
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        env:
          GITLEAKS_VERSION: 8.24.2
        run: |
          set -euo pipefail
          install_dir="${RUNNER_TEMP}/bin"
          mkdir -p "${install_dir}"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          install -m 0755 gitleaks "${install_dir}/gitleaks"
          export PATH="${install_dir}:${PATH}"
          echo "${install_dir}" >> "${GITHUB_PATH}"
          gitleaks version

      - name: Run working tree and commit range scans
        env:
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -u

          if [ -n "${PR_BASE_SHA:-}" ] && [ -n "${PR_HEAD_SHA:-}" ]; then
            log_range="${PR_BASE_SHA}..${PR_HEAD_SHA}"
          else
            git fetch --no-tags --prune --depth=1 origin main
            log_range="origin/main..HEAD"
          fi

          echo "Using log range: ${log_range}"

          set +e
          gitleaks detect --no-git --source . --config .gitleaks.toml --redact --no-banner \
            --report-format sarif --report-path gitleaks-working-tree.sarif --exit-code 1
          working_tree_exit=$?

          gitleaks detect --source . --config .gitleaks.toml --redact --no-banner \
            --log-opts "${log_range}" --report-format json --report-path gitleaks-history.json --exit-code 1
          history_exit=$?
          set -e

          if [ "${working_tree_exit}" -ne 0 ] || [ "${history_exit}" -ne 0 ]; then
            echo "Gitleaks detected potential secrets."
            exit 1
          fi

      - name: Upload Gitleaks reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-reports
          path: |
            gitleaks-working-tree.sarif
            gitleaks-history.json
          if-no-files-found: warn
