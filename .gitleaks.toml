title = "Arthexis Gitleaks Configuration"

[extend]
useDefault = true

[allowlist]
  description = "Ignore known placeholder credentials and enum values in tests/admin code"
  regexTarget = "line"
  regexes = [
    '''password=\"password\"''',
    '''DNSProviderCredential\.Provider\.GODADDY,\s+is_enabled=True'''
  ]

[[rules]]
id = "hashicorp-tf-password"

[rules.allowlist]
  regexTarget = "line"
  regexes = [
    '''password="password"'''
  ]
