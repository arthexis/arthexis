[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = tests.py test_*.py *_tests.py
addopts = --import-mode=importlib
asyncio_mode = auto
norecursedirs =
    *.egg
    .*
    _darcs
    build
    CVS
    dist
    {arch}
    node_modules
    venv
markers =
    sigil_roots: loads SigilRoot fixtures for tests that require default sigils
filterwarnings =
    # Temporary global suppression for websocket live-server runs; local markers
    # are preferred when practical, but this warning currently originates from
    # test infrastructure startup rather than individual test bodies.
    # TODO: remove once the live-server multiprocessing startup avoids fork().
    ignore:This process .* is multi-threaded, use of fork\(\) may lead to deadlocks in the child\.:DeprecationWarning
