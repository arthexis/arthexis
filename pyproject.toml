[tool.setuptools.packages.find]
where = [ ".",]


[tool.django-stubs]
django_settings_module = "config.settings"

[tool.ruff]
line-length = 88
target-version = "py310"
extend-exclude = [
  "*/migrations/*.py",
  "*/beat_migrations/*.py",
]

[tool.ruff.lint]
select = ["E9", "F823"]
extend-select = ["I", "UP", "B904"]

[tool.ruff.lint.per-file-ignores]
"apps/*/tests/*.py" = ["B904"]

[tool.setuptools.dynamic]
version = { file = ["VERSION"] }
