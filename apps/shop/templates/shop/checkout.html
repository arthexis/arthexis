{% extends "pages/base.html" %}
{% block title %}Checkout{% endblock %}
{% block content %}
<div class="container py-4">
  <h1>Checkout</h1>
  <p>Total: <strong>{{ total }}</strong></p>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button class="btn btn-success" type="submit">Place order</button>
  </form>
</div>
{% endblock %}
