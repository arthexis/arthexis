{% extends "base.html" %}
{% block content %}
<h1>Your Soul</h1>
<p>Soul ID: {{ soul.soul_id }}</p>
<a href="{% url 'souls:download' %}">Download Soul Package</a>
<form method="post" action="{% url 'souls:attach_to_checkout' %}">
  {% csrf_token %}
  <input type="hidden" name="soul_id" value="{{ soul.soul_id }}" />
  <button type="submit">Attach Soul to Checkout</button>
</form>
{% endblock %}
