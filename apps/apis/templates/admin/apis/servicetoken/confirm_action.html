{% extends "admin/base_site.html" %}

{% block content %}
  <div class="admin-ui-panel admin-ui-stack">
    <h1>{{ title }}</h1>
    <p><strong>{{ impact_note }}</strong></p>
    <p>Token prefix: <code>{{ token.token_prefix }}</code></p>
    <form method="post" class="admin-ui-stack">{% csrf_token %}
      {{ form.as_p }}
      <div class="admin-ui-actions">
        <button type="submit" class="admin-ui-button admin-ui-button--primary">{{ action_name }}</button>
      </div>
    </form>
  </div>
{% endblock %}
